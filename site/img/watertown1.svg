<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>watertown - scene badge</title>
  <defs>
    <clipPath id="badge">
      <rect x="8" y="8" width="240" height="240" rx="48" ry="48"/>
    </clipPath>
    <linearGradient id="water" gradientUnits="userSpaceOnUse"
                    x1="0" y1="118" x2="0" y2="248">
      <stop offset="0" stop-color="#1f6699"/>
      <stop offset="0.5" stop-color="#1f6699"/>
      <stop offset="1" stop-color="#0d4571"/>
    </linearGradient>
    <!-- sky: grey-blue, lighter and hazier toward the horizon -->
    <linearGradient id="sky" gradientUnits="userSpaceOnUse"
                    x1="0" y1="8" x2="0" y2="82">
      <stop offset="0" stop-color="#aec4d6"/>
      <stop offset="1" stop-color="#dce8f1"/>
    </linearGradient>
    <!-- ocean: mirror of the sky, shifted bluer but still grey -->
    <linearGradient id="ocean" gradientUnits="userSpaceOnUse"
                    x1="0" y1="82" x2="0" y2="112">
      <stop offset="0" stop-color="#bcccd9"/>
      <stop offset="1" stop-color="#7e9bb2"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#badge)">
    <!-- sky: grey-blue gradient, hazier toward the horizon -->
    <rect x="8" y="8" width="240" height="240" fill="url(#sky)"/>
    <!-- ocean in the background; a greyer mirror of the sky; horizon passes through the taller trees -->
    <rect x="8" y="82" width="240" height="30" fill="url(#ocean)"/>
    <!-- hazy horizon line where ocean meets sky -->
    <rect x="8" y="82" width="240" height="1.6" fill="#eef4f9" opacity="0.6"/>
    <!-- open water with a gentle depth gradient toward the foreground -->
    <rect x="8" y="118" width="240" height="130" fill="url(#water)"/>

    <!-- far bank: band of shrubs under the treeline, with a wavy waterline -->
    <path d="M8 104 L248 104 L248 128
             C 226 132, 206 126, 188 130
             C 168 135, 150 124, 130 128
             C 112 132, 96 122, 80 127
             C 66 131, 48 124, 36 127
             C 26 129, 16 126, 8 128 Z"
          fill="#5a8f3c"/>
    <!-- distant treeline along the horizon, taller on the left -->
    <path transform="translate(0 6)" d="M8 104
             C 14 70, 26 66, 36 86
             C 44 70, 54 72, 60 90
             C 70 60, 80 62, 86 92
             C 98 78, 110 80, 118 96
             C 130 82, 142 84, 150 98
             C 162 86, 176 88, 184 100
             C 198 90, 214 92, 224 102
             C 232 96, 242 98, 248 104 Z"
          fill="#3c6c28"/>

    <!-- foreground grassy peninsula jutting from the lower-left -->
    <path d="M8 150
             C 36 150, 66 158, 96 168
             C 120 176, 130 188, 120 200
             C 108 212, 78 214, 52 224
             C 36 230, 20 240, 8 248 Z"
          fill="#5a8f3c"/>
    <path d="M8 168
             C 30 168, 58 176, 86 186
             C 104 192, 110 200, 100 208
             C 86 216, 58 218, 36 228
             C 26 232, 16 240, 8 248 Z"
          fill="#6fa84a"/>

    <!-- duck cluster, scaled down in place -->
    <g transform="translate(176 157) scale(0.67) translate(-176 -157)">
    <!-- very small duck on the open water, right of center -->
    <g fill="#00325a" transform="translate(176 158) scale(1.0)">
      <path d="M16.5 -10 C14.5 -9 12.5 -7.7 9 -7.5 C4 -7.3 0 -7 -3 -6.2
               C-4.6 -5.8 -5.3 -6.3 -6 -7.6 C-6.8 -9.1 -7 -10.8 -8.6 -11.6
               C-10 -12.3 -11.8 -12 -12.7 -10.7 C-13.5 -9.6 -13.4 -8.4 -12.6 -7.6
               C-14.3 -7.5 -16.4 -7.2 -16.2 -6.1 C-16 -5.1 -14 -5.4 -12.4 -5.7
               C-11.2 -5.9 -10.6 -4.9 -10.1 -3.7 C-9.4 -1.9 -7.6 -0.2 -4.5 1
               C0 2.6 6 2.6 10 1.2 C12.6 0.3 14.4 -0.8 15 -2.6
               C15.7 -4.8 16.8 -7.8 16.5 -10 Z"/>
    </g>
    <!-- waterline: submerge the duck's lower body so it sits in the water -->
    <path d="M152 157.6 Q176 156 200 157.6 L200 172 L152 172 Z" fill="#1f6699"/>
    <!-- meniscus highlight where the body meets the water -->
    <path d="M163 157.2 Q176 159 189 157.2" stroke="#6ba6d0"
          stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.85"/>
    <!-- concentric ripples spreading from the duck -->
    <g stroke="#4a8cbd" stroke-linecap="round" fill="none">
      <path d="M150 161 q26 6 52 0" stroke-width="1.6" opacity="0.9"/>
      <path d="M144 165 q32 7 64 0" stroke-width="1.4" opacity="0.65"/>
    </g>
    </g>

    <!-- water ripples on the open water -->
    <g stroke="#4a8cbd" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.9">
      <path d="M150 188 q24 -8 48 0 t48 0"/>
      <path d="M168 210 q22 -8 44 0 t44 0"/>
    </g>

    <!-- tall grass at the near shore, lower-left -->
    <g stroke="#3c6c28" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path d="M22 248 q-4 -26 4 -46"/>
      <path d="M32 248 q2 -28 10 -48"/>
      <path d="M44 248 q-3 -24 6 -44"/>
      <path d="M56 248 q3 -22 12 -40"/>
    </g>
    <g stroke="#9bbf4a" stroke-width="2" stroke-linecap="round" fill="none">
      <path d="M27 248 q0 -24 8 -42"/>
      <path d="M40 248 q-2 -22 8 -40"/>
      <path d="M52 248 q2 -20 10 -36"/>
    </g>
  </g>
  <!-- badge outline -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48"
        fill="none" stroke="#00325a" stroke-width="6"/>
</svg>

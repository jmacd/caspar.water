<svg viewBox="0 0 1240 720" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="t d" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title id="t">Caspar Water telemetry system</title>
  <desc id="d">Sensors feed a pumphouse OpenTelemetry collector, which forwards over OTel Arrow to a gateway, which archives to attached storage and ships to a cloud InfluxDB behind Caddy.</desc>

  <defs>
    <style>
      .lane-title { font-size: 11px; font-weight: 600; fill: #0c4a6e; letter-spacing: 0.14em; }
      .host-title { font-size: 12px; font-weight: 600; fill: #334155; letter-spacing: 0.02em; }
      .card-title { font-size: 11px; font-weight: 600; fill: #475569; letter-spacing: 0.02em; }
      .node-title { font-size: 12px; font-weight: 500; fill: #1e293b; }
      .node-sub   { font-size: 10px; fill: #64748b; }
      .edge-label { font-size: 10.5px; fill: #475569; paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round; }
      .edge-label-strong { font-size: 11px; font-weight: 500; fill: #0c4a6e; paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round; }
      .edge      { stroke: #64748b; stroke-width: 1.3; fill: none; }
      .edge-strong { stroke: #0c4a6e; stroke-width: 2.2; fill: none; }
      .edge-dash { stroke: #94a3b8; stroke-width: 1.2; fill: none; stroke-dasharray: 5 3; }
      .lane-bg   { fill: #fafbfc; }
      .host      { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 3 2; }
      .card      { fill: #f4f8fb; stroke: #d8e3ee; stroke-width: 1; }
      .sensor    { fill: #fef7e0; stroke: #e0a826; stroke-width: 1; }
      .node      { fill: #e6f1fa; stroke: #6aa8d1; stroke-width: 1; }
      .node-edge { fill: #0c4a6e; stroke: #0c4a6e; }
      .node-edge text { fill: #ffffff; }
      .store     { fill: #ecfdf5; stroke: #34a17a; stroke-width: 1; }
      .static    { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; }
      .actor     { fill: #ffffff; stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4 2; }
    </style>

    <marker id="arr"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arr-s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0c4a6e"/>
    </marker>
    <marker id="arr-m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- ===== Lane backgrounds ===== -->
  <rect class="lane-bg" x="20"  y="70" width="220" height="620" rx="8"/>
  <rect class="lane-bg" x="260" y="70" width="320" height="620" rx="8"/>
  <rect class="lane-bg" x="600" y="70" width="270" height="620" rx="8"/>
  <rect class="lane-bg" x="890" y="70" width="330" height="620" rx="8"/>

  <!-- Lane titles -->
  <text class="lane-title" x="130"  y="56" text-anchor="middle">SENSORS</text>
  <text class="lane-title" x="420"  y="56" text-anchor="middle">PUMPHOUSE</text>
  <text class="lane-title" x="735"  y="56" text-anchor="middle">GATEWAY</text>
  <text class="lane-title" x="1055" y="56" text-anchor="middle">CLOUD</text>

  <!-- ===== Containers (drawn first so edges & nodes paint above) ===== -->

  <!-- Pumphouse: COTS + BBB host + Collector card -->
  <rect class="host" x="275" y="290" width="290" height="370" rx="8"/>
  <text class="host-title" x="420" y="310" text-anchor="middle">BeagleBone Black industrial</text>
  <rect class="card" x="290" y="332" width="260" height="313" rx="6"/>
  <text class="card-title" x="420" y="352" text-anchor="middle">OpenTelemetry Collector</text>

  <!-- Gateway host + Collector card -->
  <rect class="host" x="615" y="290" width="240" height="370" rx="8"/>
  <text class="host-title" x="735" y="310" text-anchor="middle">Gateway</text>
  <rect class="card" x="630" y="332" width="210" height="263" rx="6"/>
  <text class="card-title" x="735" y="352" text-anchor="middle">OpenTelemetry Collector</text>

  <!-- Cloud container -->
  <rect class="host" x="905" y="200" width="300" height="460" rx="8"/>
  <text class="host-title" x="1055" y="220" text-anchor="middle">Linode</text>

  <!-- ===== Edges (drawn before nodes so node fills mask edge endpoints) ===== -->

  <!-- 4-20 mA: sensors -> COTS -->
  <path class="edge" d="M 215 100 H 320 V 200"        marker-end="url(#arr)"/>
  <path class="edge" d="M 215 160 H 380 V 200"        marker-end="url(#arr)"/>
  <path class="edge" d="M 215 220 H 440 V 200"        marker-end="url(#arr)"/>
  <path class="edge" d="M 215 280 H 500 V 200"        marker-end="url(#arr)"/>

  <!-- pH probe -> atlasph receiver (I²C/UART) -->
  <path class="edge" d="M 215 380 H 255 V 470 H 295"  marker-end="url(#arr)"/>

  <!-- COTS -> MQTT broker (MQTT Sparkplug B) -->
  <path class="edge" d="M 420 256 V 280 H 485 V 383"  marker-end="url(#arr)"/>

  <!-- Internal collector flow (pumphouse) -->
  <path class="edge" d="M 485 417 V 453"                marker-end="url(#arr)"/>
  <path class="edge" d="M 485 487 V 573"                marker-end="url(#arr)"/>
  <path class="edge" d="M 355 487 V 573"                marker-end="url(#arr)"/>

  <!-- OTel Arrow: pumphouse otelarrow exporter -> gateway otelarrow receiver -->
  <path class="edge-strong" d="M 510 590 H 580 V 395 H 645" marker-end="url(#arr-s)"/>

  <!-- Internal gateway: single arrow conveying flow direction (receivers -> exporters) -->
  <path class="edge" d="M 735 467 V 498"                marker-end="url(#arr)"/>

  <!-- jsonfile exporter -> NFS storage -->
  <path class="edge" d="M 735 547 V 606"                marker-end="url(#arr)"/>

  <!-- influxdb exporter -> Caddy (HTTPS to cloud) -->
  <path class="edge-strong" d="M 825 590 H 870 V 265 H 935" marker-end="url(#arr-s)"/>

  <!-- Caddy -> InfluxDB and Caddy -> Static site -->
  <path class="edge" d="M 1015 290 V 330 H 975 V 375"   marker-end="url(#arr)"/>
  <path class="edge" d="M 1095 290 V 330 H 1135 V 375"  marker-end="url(#arr)"/>

  <!-- Operators -> Caddy -->
  <path class="edge" d="M 1055 167 V 240"               marker-end="url(#arr)"/>

  <!-- ===== Nodes ===== -->

  <!-- Sensors -->
  <g>
    <rect class="sensor" x="35" y="78"  width="190" height="44" rx="6"/>
    <text class="node-title" x="130" y="98"  text-anchor="middle">Well depth</text>
    <text class="node-sub"   x="130" y="113" text-anchor="middle">In-Situ</text>

    <rect class="sensor" x="35" y="138" width="190" height="44" rx="6"/>
    <text class="node-title" x="130" y="158" text-anchor="middle">System pressure</text>
    <text class="node-sub"   x="130" y="173" text-anchor="middle">Dwyer</text>

    <rect class="sensor" x="35" y="198" width="190" height="44" rx="6"/>
    <text class="node-title" x="130" y="218" text-anchor="middle">Chlorine tank level</text>
    <text class="node-sub"   x="130" y="233" text-anchor="middle">Banner</text>

    <rect class="sensor" x="35" y="258" width="190" height="44" rx="6"/>
    <text class="node-title" x="130" y="278" text-anchor="middle">Concrete tank level</text>
    <text class="node-sub"   x="130" y="293" text-anchor="middle">Dwyer</text>

    <rect class="sensor" x="35" y="358" width="190" height="44" rx="6"/>
    <text class="node-title" x="130" y="378" text-anchor="middle">pH probe</text>
    <text class="node-sub"   x="130" y="393" text-anchor="middle">Atlas Scientific</text>
  </g>

  <!-- COTS device -->
  <rect class="node" x="275" y="200" width="290" height="56" rx="6"/>
  <text class="node-title" x="420" y="223" text-anchor="middle">MQTT–Sparkplug device</text>
  <text class="node-sub"   x="420" y="240" text-anchor="middle">4 × 4–20 mA inputs</text>

  <!-- Pumphouse Collector internals -->
  <rect class="node" x="425" y="383" width="120" height="34" rx="5"/>
  <text class="node-title" x="485" y="404" text-anchor="middle" style="font-size: 11px;">MQTT broker</text>

  <rect class="node" x="425" y="453" width="120" height="34" rx="5"/>
  <text class="node-title" x="485" y="474" text-anchor="middle" style="font-size: 11px;">sparkplug receiver</text>

  <rect class="node" x="295" y="453" width="120" height="34" rx="5"/>
  <text class="node-title" x="355" y="474" text-anchor="middle" style="font-size: 11px;">atlasph receiver</text>

  <rect class="node" x="330" y="573" width="180" height="34" rx="5"/>
  <text class="node-title" x="420" y="594" text-anchor="middle" style="font-size: 11px;">otelarrow exporter</text>

  <!-- Gateway Collector internals (single column) -->
  <rect class="node" x="645" y="378" width="180" height="34" rx="5"/>
  <text class="node-title" x="735" y="399" text-anchor="middle" style="font-size: 11px;">otelarrow receiver</text>

  <rect class="node" x="645" y="425" width="180" height="42" rx="5"/>
  <text class="node-title" x="735" y="442" text-anchor="middle" style="font-size: 11px;">prometheus receiver</text>
  <text class="node-sub"   x="735" y="457" text-anchor="middle" style="font-size: 9.5px;">scrapes pumphouse</text>

  <rect class="node" x="645" y="498" width="180" height="34" rx="5"/>
  <text class="node-title" x="735" y="519" text-anchor="middle" style="font-size: 11px;">jsonfile exporter</text>

  <rect class="node" x="645" y="556" width="180" height="34" rx="5"/>
  <text class="node-title" x="735" y="577" text-anchor="middle" style="font-size: 11px;">influxdb exporter</text>

  <!-- NFS storage (cylinder) -->
  <g>
    <ellipse class="store" cx="735" cy="606" rx="80" ry="8"/>
    <path class="store" d="M 655 606 V 630 a 80 8 0 0 0 160 0 V 606 z"/>
    <ellipse cx="735" cy="606" rx="80" ry="8" fill="none" stroke="#34a17a" stroke-width="1" opacity="0.5"/>
    <text class="node-title" x="735" y="625" text-anchor="middle" style="font-size: 11px;">NFS-mounted storage</text>
  </g>

  <!-- Operators -->
  <rect class="actor" x="945" y="125" width="220" height="42" rx="6"/>
  <text class="node-title" x="1055" y="143" text-anchor="middle">Operators / dashboards</text>
  <text class="node-sub"   x="1055" y="158" text-anchor="middle">browser</text>

  <!-- Caddy (edge node, prominent) -->
  <rect class="node-edge" x="935" y="240" width="240" height="50" rx="6"/>
  <text x="1055" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Caddy</text>
  <text x="1055" y="278" text-anchor="middle" font-size="10.5" fill="#cfe6f5">Let's Encrypt ACME</text>

  <!-- InfluxDB cylinder -->
  <g>
    <ellipse class="store" cx="975" cy="375" rx="70" ry="9"/>
    <path class="store" d="M 905 375 V 435 a 70 9 0 0 0 140 0 V 375 z"/>
    <ellipse cx="975" cy="375" rx="70" ry="9" fill="none" stroke="#34a17a" stroke-width="1" opacity="0.5"/>
    <text class="node-title" x="975" y="413" text-anchor="middle">InfluxDB v2.x</text>
  </g>

  <!-- Static site -->
  <rect class="static" x="1075" y="375" width="120" height="70" rx="6"/>
  <text class="node-title" x="1135" y="414" text-anchor="middle">Static site</text>

  <!-- ===== Edge labels (drawn last, with halos) ===== -->

  <text class="edge-label" x="438" y="194" text-anchor="middle">4 × 4–20 mA current loops</text>
  <text class="edge-label" x="248" y="367" text-anchor="start">I²C / UART</text>
  <text class="edge-label" x="500" y="276" text-anchor="start">MQTT Sparkplug B</text>
  <text class="edge-label-strong" text-anchor="middle" transform="rotate(-90, 590, 492)" x="590" y="495">OpenTelemetry-Arrow Protocol</text>
  <text class="edge-label-strong" text-anchor="middle" transform="rotate(-90, 880, 415)" x="880" y="418">HTTPS · InfluxDB v2 write API</text>
  <text class="edge-label" x="970" y="320" text-anchor="end">influx.casparwater.us</text>
  <text class="edge-label" x="1140" y="320" text-anchor="start">casparwater.us</text>
  <text class="edge-label" x="1068" y="208" text-anchor="start">HTTPS</text>

</svg>

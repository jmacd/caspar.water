<svg viewBox="0 0 1160 780" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="t d"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title id="t">Caspar Water telemetry system</title>
  <desc id="d">Three sites and two OpenTelemetry collectors. A pump-house collector with one i²c pH sensor (Atlas) and four 4-20 mA sensors via an MQTT/Sparkplug device sends OTel Arrow over a low-bandwidth radio link to a gateway collector, which records OTLP/JSON metrics that feed a Duckpond static site generator, and forwards live data over HTTPS to an InfluxDB on the same cloud machine that serves the public portal.</desc>

  <rect x="0" y="0" width="1160" height="780" fill="#ffffff"/>

  <defs>
    <style>
      .site-title { font-size: 18px; font-weight: 700; fill: #0c4a6e; letter-spacing: 0.18em; }
      .site-sub   { font-size: 11px; font-style: italic; fill: #64748b; }
      .node-title { font-size: 12px; font-weight: 500; fill: #1e293b; }
      .node-big   { font-size: 14px; font-weight: 600; fill: #1e293b; }
      .node-sub   { font-size: 10px; fill: #64748b; }
      .col-title  { font-size: 14px; font-weight: 500; fill: #ffffff; letter-spacing: 0.02em; }
      .col-big    { font-size: 22px; font-weight: 700; fill: #ffffff; letter-spacing: 0.04em; }
      .edge-label        { font-size: 11px; fill: #475569; paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round; }
      .edge-label-strong { font-size: 12.5px; font-weight: 600; fill: #0c4a6e; paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round; }
      .edge-label-sub    { font-size: 10.5px; fill: #475569; paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round; }
      .edge        { stroke: #64748b; stroke-width: 1.4; fill: none; }
      .edge-strong { stroke: #0c4a6e; stroke-width: 2.4; fill: none; }
      .edge-radio  { stroke: #0c4a6e; stroke-width: 2.6; fill: none; }
      .edge-dash   { stroke: #94a3b8; stroke-width: 1.4; fill: none; stroke-dasharray: 6 3; }
      .site      { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .sensor    { fill: #fef7e0; stroke: #c79018; stroke-width: 1; }
      .device    { fill: #e6f1fa; stroke: #6aa8d1; stroke-width: 1; }
      .collector { fill: #0c4a6e; stroke: #0c4a6e; stroke-width: 1; }
      .archive   { fill: #fef9e6; stroke: #b8884d; stroke-width: 1; }
      .store     { fill: #ecfdf5; stroke: #34a17a; stroke-width: 1; }
      .portal    { fill: #f0f7ff; stroke: #6aa8d1; stroke-width: 1; }
      .actor     { fill: #ffffff; stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4 2; }
      .enclosure { fill: none; stroke: #64748b; stroke-width: 1; stroke-dasharray: 2 3; }
      .enclosure-label { font-size: 10px; fill: #64748b; }
    </style>

    <marker id="arr"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arr-s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0c4a6e"/>
    </marker>
    <marker id="arr-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>

    <!-- OpenTelemetry logo -->
    <symbol id="otel-logo" viewBox="0 0 128 128">
      <path fill="#f5a800" d="M67.648 69.797c-5.246 5.25-5.246 13.758 0 19.008 5.25 5.246 13.758 5.246 19.004 0 5.25-5.25 5.25-13.758 0-19.008-5.246-5.246-13.754-5.246-19.004 0Zm14.207 14.219a6.649 6.649 0 0 1-9.41 0 6.65 6.65 0 0 1 0-9.407 6.649 6.649 0 0 1 9.41 0c2.598 2.586 2.598 6.809 0 9.407ZM86.43 3.672l-8.235 8.234a4.17 4.17 0 0 0 0 5.875l32.149 32.149a4.17 4.17 0 0 0 5.875 0l8.234-8.235c1.61-1.61 1.61-4.261 0-5.87L92.29 3.671a4.159 4.159 0 0 0-5.86 0ZM28.738 108.895a3.763 3.763 0 0 0 0-5.31l-4.183-4.187a3.768 3.768 0 0 0-5.313 0l-8.644 8.649-.016.012-2.371-2.375c-1.313-1.313-3.45-1.313-4.75 0-1.313 1.312-1.313 3.449 0 4.75l14.246 14.242a3.353 3.353 0 0 0 4.746 0c1.3-1.313 1.313-3.45 0-4.746l-2.375-2.375.016-.012Zm0 0"/>
      <path fill="#425cc7" d="M72.297 27.313 54.004 45.605c-1.625 1.625-1.625 4.301 0 5.926L65.3 62.824c7.984-5.746 19.18-5.035 26.363 2.153l9.148-9.149c1.622-1.625 1.622-4.297 0-5.922L78.22 27.313a4.185 4.185 0 0 0-5.922 0ZM60.55 67.585l-6.672-6.672c-1.563-1.562-4.125-1.562-5.684 0l-23.53 23.54a4.036 4.036 0 0 0 0 5.687l13.331 13.332a4.036 4.036 0 0 0 5.688 0l15.132-15.157c-3.199-6.609-2.625-14.593 1.735-20.73Zm0 0"/>
    </symbol>

    <!-- Caddy logo -->
    <symbol id="caddy-logo" viewBox="0 0 512 512"><style>.st0{fill-rule:evenodd;clip-rule:evenodd;fill:#1f88c0}</style><g id="Icon" transform="matrix(.85801 0 0 .90748 -3224.99 -1435.83)"><path d="M4314.693 1795.227c7.42 33.993 6.673 67.565.563 99.736-6.21 32.657-18.722 63.552-36.641 91.445a307 307 0 0 1-23.638 32.035c-8.585 10.048-17.877 19.75-27.99 28.674-29.593 26.418-65.388 47.44-106.907 59.409-32.91 9.739-66.139 13.426-98.6 11.383-34.19-2.193-67.223-10.373-97.775-23.898l-3 5.407c30.402 16.403 63.896 27.452 99.068 32.45 34.47 4.957 70.331 3.94 106.424-3.659 46.796-10.314 88.463-30.608 122.545-58.306a256 256 0 0 0 32.365-31.534c9.748-11.435 18.53-23.608 25.99-36.424 18.502-31.732 30.346-67.127 33.7-103.853 3.152-34.907-1.335-70.836-13.773-106.092zm-472.603 235.266c-13.593-14.08-25.756-29.693-35.858-46.78-9.843-16.695-17.64-34.629-23.516-53.692-2.245-9.525-3.932-18.97-4.936-28.444-4.104-38.793 2.524-76.473 15.595-111.583 6.999-18.83 16.334-36.675 26.958-53.714 14.179-22.672 30.97-43.896 51.35-62.322 29.959-27.053 66.32-48.534 108.59-60.857 34.38-9.98 69.207-13.711 102.997-10.72 23.493 2.067 46.492 6.875 68.073 14.978 24.403 9.188 46.916 22.489 67.189 38.308 19.89 15.537 37.278 34.047 51.934 54.67 1.95 2.7 3.171 5.824 5.585 8.246 1.864 1.803 3.98 2.54 6.124 3.96l8.72-5.252c-.548-2.615-.512-4.773-1.613-7.163-1.526-3.12-4.317-5.518-6.645-8.193-23.863-28.359-53.37-51.446-86.252-68.796-14.019-7.368-28.667-13.647-43.695-19.056-16.566-5.995-33.618-10.939-51.184-14.364-40.092-7.9-82.38-8.537-124.862.698-46.119 9.98-87.185 29.652-120.863 56.858-23.39 18.926-43.58 41.214-58.633 66.345-11.296 18.83-19.544 39.299-25.013 60.404-9.82 38.075-9.935 78.306-1.08 118.511 2.083 9.492 4.543 18.96 7.705 28.47 5.112 19.65 12.524 38.148 21.643 55.575 9.454 18.103 20.72 34.955 33.741 50.338z" class="st0"/><path d="M-51.7 26.4c.1-6.4-5.5-11.6-12.2-11.6-3.6 0-6.8 1.5-9.1 3.9-2 2.1-3.3 4.9-3.3 7.9-.1 6.4 5.5 11.6 12.2 11.6 6.7-.1 12.3-5.4 12.4-11.8z" style="fill:none;stroke:#1f88c0;stroke-width:5.7819;stroke-linejoin:round;stroke-miterlimit:22.0264" transform="rotate(-171.321 2107.672 748.746)scale(3.41014)"/><path d="M4217.164 1832.067s7.23-6.484 16.677-14.671c15.922-15.027 37.43-36.213 37.43-36.213l-7.031-7.707s-25.336 16.637-43.393 29.559c-9.982 7.66-18.28 13.092-18.28 13.092z" class="st0"/><g id="Padlock"><path d="M24.1 91.2h51c2.9 0 5.2-2.2 5.2-4.9V37.9c0-2.7-2.3-4.9-5.2-4.9H-.8C-3.7 33-6 35.2-6 37.9v28.6" style="fill:none;stroke:#22b638;stroke-width:9.5045;stroke-miterlimit:20.1153" transform="translate(3938.31 1737.25)scale(3.11426)"/><path d="M12.6 33V9.7c0-12.8 11.1-23.3 24.6-23.3S61.8-3.1 61.8 9.7V33" style="fill:none;stroke:#22b638;stroke-width:9.5045;stroke-linejoin:round;stroke-miterlimit:20.1153" transform="translate(3938.31 1737.25)scale(3.11426)"/></g><path d="M28.5 56.3c0-2-.5-3.9-1.4-5.5-2.1-3.6-6.1-6.1-10.8-6.1C9.6 44.7 4 50 3.9 56.4 3.9 62.8 9.4 68 16.1 68s12.3-5.3 12.4-11.7z" style="fill:none;stroke:#1f88c0;stroke-width:8.4748;stroke-linejoin:round;stroke-miterlimit:34.5908" transform="rotate(7.483 -11286.051 30322.67)scale(5.35538)"/><path d="M4036.657 1923.344s-40.417 23.032-69.58 40.521c-16.492 10.221-28.941 18.58-28.941 18.58l25.805 31.141s11.845-9.152 26.031-22.006c25.046-22.506 58.435-53.981 58.435-53.981z" class="st0"/></g></symbol>
  </defs>

  <!-- ============================================================
       Three site containers
       ============================================================ -->
  <rect class="site" x="40"  y="108" width="290" height="600" rx="10"/>
  <rect class="site" x="435" y="108" width="290" height="600" rx="10"/>
  <rect class="site" x="830" y="108" width="290" height="600" rx="10"/>

  <!-- Site titles (above the boxes) -->
  <text class="site-title" x="185"  y="88" text-anchor="middle">PUMPHOUSE</text>
  <text class="site-title" x="580"  y="88" text-anchor="middle">GATEWAY</text>
  <text class="site-title" x="975" y="88" text-anchor="middle">CLOUD</text>

  <!-- Site sub-headers (inside, top) -->


  <!-- ============================================================
       INTRA-SITE edges
       ============================================================ -->

  <!-- Pumphouse: 4 sensors -> MQTT/Sparkplug (short horizontals) -->
  <path class="edge" d="M 180 520 H 200" marker-end="url(#arr)"/>
  <path class="edge" d="M 180 555 H 200" marker-end="url(#arr)"/>
  <path class="edge" d="M 180 590 H 200" marker-end="url(#arr)"/>
  <path class="edge" d="M 180 625 H 200" marker-end="url(#arr)"/>

  <!-- Pumphouse: MQTT/Sparkplug -> Collector (up the right lane) -->
  <path class="edge" d="M 290 505 V 320" marker-end="url(#arr)"/>

  <!-- Pumphouse: pH probe -> Collector (i²c) -->
  <path class="edge" d="M 160 405 V 320" marker-end="url(#arr)"/>

  <!-- Gateway: Collector -> metrics disk -->
  <path class="edge" d="M 580 320 V 398" marker-end="url(#arr)"/>

  <!-- Gateway: metrics disk -> Duckpond -->
  <path class="edge" d="M 580 489 V 540" marker-end="url(#arr)"/>

  <!-- ============================================================
       INTER-SITE edges
       ============================================================ -->

  <!-- Radio link: pumphouse collector -> gateway collector -->
  <path class="edge-radio"
        d="M 320 235 H 445"
        marker-end="url(#arr-s)"/>

  <!-- HTTPS write: gateway collector -> cloud InfluxDB -->
  <path class="edge-strong" d="M 715 250 H 795 V 445 H 865" marker-end="url(#arr-s)"/>

  <!-- Static site content: gateway Duckpond -> cloud Site content -->
  <path class="edge-strong" d="M 715 594 H 865" marker-end="url(#arr-s)"/>

  <!-- Cloud: Caddy -> InfluxDB (center) and Static Content (right, routed under InfluxDB) -->
  <path class="edge" d="M 975 320 V 398" marker-end="url(#arr)"/>
  <path class="edge" d="M 1040 320 V 549" marker-end="url(#arr)"/>

  <!-- ============================================================
       Nodes
       ============================================================ -->

  <!-- Pumphouse: OTel Collector (THE STAR #1) — top of region -->
  <rect class="enclosure" x="42" y="146" width="286" height="220" rx="12"/>
  <rect class="collector" x="50" y="150" width="270" height="170" rx="10"/>
  <circle cx="185" cy="200" r="34" fill="#ffffff"/>
  <use href="#otel-logo" x="159" y="174" width="52" height="52"/>
  <text class="col-title" x="185" y="262" text-anchor="middle">OpenTelemetry</text>
  <text class="col-big"   x="185" y="292" text-anchor="middle">Collector</text>
  <text class="enclosure-label" x="60" y="340" text-anchor="start">BeagleBone Black</text>
  <text class="enclosure-label" x="60" y="354" text-anchor="start">industrial</text>

  <!-- Pumphouse: pH probe (i²c) -->
  <rect class="sensor" x="60" y="405" width="120" height="30" rx="5"/>
  <text class="node-title" x="120" y="425" text-anchor="middle">pH</text>

  <!-- Pumphouse: 4 × 4-20 mA sensors (short labels) -->
  <g>
    <rect class="sensor" x="60" y="505" width="120" height="30" rx="5"/>
    <text class="node-title" x="120" y="525" text-anchor="middle">Depth</text>

    <rect class="sensor" x="60" y="540" width="120" height="30" rx="5"/>
    <text class="node-title" x="120" y="560" text-anchor="middle">Pressure</text>

    <rect class="sensor" x="60" y="575" width="120" height="30" rx="5"/>
    <text class="node-title" x="120" y="595" text-anchor="middle">Chlorine</text>

    <rect class="sensor" x="60" y="610" width="120" height="30" rx="5"/>
    <text class="node-title" x="120" y="630" text-anchor="middle">Level</text>
  </g>

  <!-- Pumphouse: MQTT/Sparkplug device -->
  <rect class="device" x="200" y="505" width="110" height="138" rx="6"/>
  <text class="node-big" x="255" y="563" text-anchor="middle">MQTT</text>
  <text class="node-big" x="255" y="582" text-anchor="middle">Sparkplug</text>
  <text class="node-sub" x="255" y="604" text-anchor="middle">Edge device</text>

  <!-- Gateway: OTel Collector (THE STAR #2) — top of region -->
  <rect class="enclosure" x="437" y="146" width="286" height="220" rx="12"/>
  <rect class="collector" x="445" y="150" width="270" height="170" rx="10"/>
  <circle cx="580" cy="200" r="34" fill="#ffffff"/>
  <use href="#otel-logo" x="554" y="174" width="52" height="52"/>
  <text class="col-title" x="580" y="262" text-anchor="middle">OpenTelemetry</text>
  <text class="col-big"   x="580" y="292" text-anchor="middle">Collector</text>
  <text class="enclosure-label" x="455" y="347" text-anchor="start">Linux x86</text>

  <!-- Gateway: metrics disk (upper) and Duckpond region (lower) -->
  <g>
    <ellipse class="archive" cx="580" cy="410" rx="110" ry="9"/>
    <path class="archive" d="M 470 410 V 480 a 110 9 0 0 0 220 0 V 410 z"/>
    <ellipse cx="580" cy="410" rx="110" ry="9" fill="none" stroke="#b8884d" stroke-width="1" opacity="0.5"/>
    <text class="node-big" x="580" y="458" text-anchor="middle">OTLP/JSON Metrics</text>
  </g>

  <!-- Gateway: Duckpond (static site generator) -->
  <rect class="enclosure" x="437" y="540" width="286" height="150" rx="12"/>
  <rect class="device" x="445" y="544" width="270" height="100" rx="10"/>
  <text class="node-big" x="580" y="592" text-anchor="middle">Duckpond</text>
  <text class="node-sub" x="580" y="611" text-anchor="middle">Filing System</text>
  <text class="enclosure-label" x="455" y="668" text-anchor="start">Linux ARM</text>

  <!-- Cloud: Caddy web server (matches OTel Collector) -->
  <rect class="enclosure" x="832" y="146" width="286" height="220" rx="12"/>
  <rect class="collector" x="840" y="150" width="270" height="170" rx="10"/>
  <circle cx="975" cy="200" r="34" fill="#ffffff"/>
  <use href="#caddy-logo" x="949" y="174" width="52" height="52"/>
  <text class="col-title" x="975" y="262" text-anchor="middle">Caddy</text>
  <text class="col-big"   x="975" y="292" text-anchor="middle">Web Server</text>
  <text class="enclosure-label" x="850" y="347" text-anchor="start">Linode VM</text>

  <!-- Cloud: InfluxDB cylinder (aligned with OTLP/JSON Metrics) -->
  <g>
    <ellipse class="store" cx="975" cy="410" rx="110" ry="9"/>
    <path class="store" d="M 865 410 V 480 a 110 9 0 0 0 220 0 V 410 z"/>
    <ellipse cx="975" cy="410" rx="110" ry="9" fill="none" stroke="#34a17a" stroke-width="1" opacity="0.5"/>
    <text class="node-big" x="975" y="455" text-anchor="middle">InfluxDB</text>
  </g>

  <!-- Cloud: Static Content cylinder -->
  <g>
    <ellipse class="store" cx="975" cy="559" rx="110" ry="9"/>
    <path class="store" d="M 865 559 V 629 a 110 9 0 0 0 220 0 V 559 z"/>
    <ellipse cx="975" cy="559" rx="110" ry="9" fill="none" stroke="#34a17a" stroke-width="1" opacity="0.5"/>
    <text class="node-big" x="975" y="607" text-anchor="middle">Static Content</text>
  </g>

  <!-- ============================================================
       Edge labels (drawn last, with halos)
       ============================================================ -->

  <!-- Pumphouse internal labels -->
  <text class="edge-label" x="283" y="465" text-anchor="end">MQTT</text>
  <text class="edge-label" x="153" y="390" text-anchor="end">i²c</text>

  <!-- Pumphouse sensor group label (above the column) -->
  <text class="node-sub" x="120" y="497" text-anchor="middle" style="font-style: italic;">4 × 4–20 mA loops</text>

  <!-- Inter-site labels -->

</svg>

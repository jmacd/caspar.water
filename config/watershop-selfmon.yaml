# Systemd journal collection (incremental, cursor-tracked).  Captures
# every systemd unit, the kernel ring buffer (dmesg), and the
# pond-selfmon@*.service runs themselves -- self-referential, which
# enables the memory-monitor study (peak RSS gets logged on every
# service exit and ingested on the next tick).
version: v1
kind: mknod
metadata:
  path: /system/etc/journal
spec:
  factory: journal-ingest
  config:
    pond_path: /logs/journal
    journalctl_command: journalctl
    collect_kernel: true
    # --merge pulls both the system journal and the invoking user's
    # journal in one stream.  Required to capture user-scope units
    # like `pond@water-prod.service` and `pond-selfmon@*.service`,
    # which surface as `user-<unit>.jsonl` files in /logs/journal/
    # and feed the status-grid page.
    extra_args:
      - --merge
---
# Caddy webserver-style access logs (JSON), mirrored from the host's
# /var/log/caddy/.  Read with `jsonlogs://` (Caddy emits structured
# JSON; `weblog://` would be for CLF).
version: v1
kind: mknod
metadata:
  path: /system/etc/caddy-access
spec:
  factory: logfile-ingest
  config:
    archived_pattern: /var/log/caddy/access.log.*
    active_pattern: /var/log/caddy/access.log
    pond_path: /logs/web/watershop
---
# ── Per-pond perf metrics ingest ─────────────────────────────────
# config/scripts/measure-pond.sh writes one JSON line per pond into
# ${SELFMON_METRICS_DIR}/<pond>.jsonl each tick, and run-selfmon.sh inline
# writes _self.jsonl.  We give each pond its own logfile-ingest
# mknod (and corresponding /derived sql-derived-series below)
# because logfile-ingest selects exactly ONE active file per mknod
# (factory/logfile_ingest.rs:204), so a single glob won't work.
# All files share pond_path: /measure -- filenames stay flat, e.g.
# /measure/water-staging.jsonl, /measure/_self.jsonl.
#
# run-selfmon.sh runs each of these via `pond run /system/etc/measure/<pond> push`
# in a loop matching env/*.env.

version: v1
kind: mknod
metadata:
  path: /system/etc/measure/_self
spec:
  factory: logfile-ingest
  config:
    archived_pattern: "${env:SELFMON_METRICS_DIR}/_self.jsonl.*"
    active_pattern:   "${env:SELFMON_METRICS_DIR}/_self.jsonl"
    pond_path:        /measure
---

version: v1
kind: mknod
metadata:
  path: /system/run/1-backup
spec:
  factory: remote
  config:
    region: "${env:S3_REGION}"
    url: "${env:S3_URL}"
    endpoint: "${env:S3_ENDPOINT}"
    access_key: "${env:S3_ACCESS_KEY}"
    secret_key: "${env:S3_SECRET_KEY}"
    allow_http: ${env:S3_ALLOW_HTTP:-false}
---
# Aggregated traffic series for sitegen / ad-hoc charting.
#
# `/derived` houses two kinds of entries:
#
#   1. Per-pond `sql-derived-series` (`p-<pond>`).  Reads the
#      mirrored jsonl, casts every column to its proper type, and
#      emits a typed FileSeries.  Column names are un-prefixed and
#      match the canonical `<param>.<unit>` from the semconv
#      registry (config/semconv/duckpond-pond.yaml).  Pond name is
#      NOT in the column -- timeseries-join attaches it as a scope.
#
#   2. The cross-pond `perf` `timeseries-join`.  FULL OUTER JOINs
#      every per-pond series on `timestamp` with `scope: <pond>`,
#      producing wide columns of shape `<pond>.<param>.<unit>` that
#      chart.js groups into one panel per metric (chartKey =
#      `<param>.<unit>`) with one line per pond.
#
#   3. `_self` follows the same convention with scope: "_self" and
#      different column names (sitegen.seconds, sitegen_peak_rss.bytes).
version: v1
kind: mknod
metadata:
  path: /derived
spec:
  factory: dynamic-dir
  config:
    entries:
      - name: "watershop-pageviews"
        factory: "sql-derived-series"
        config:
          patterns:
            logs: "jsonlogs:///logs/web/watershop/access.*"
          query: >-
            SELECT
              date_trunc('hour', CAST(ts AS TIMESTAMP)) as timestamp,
              CAST(status AS INT) as status,
              COUNT(*) as requests
            FROM logs
            GROUP BY date_trunc('hour', CAST(ts AS TIMESTAMP)), status
            ORDER BY timestamp

      # ── Per-pond typed series ────────────────────────────────────
      # All have the same SQL skeleton; only the source URL differs.
      # CASTs are required because jsonlogs returns all-Utf8.

      - name: "p-_self"
        factory: "sql-derived-series"
        config:
          patterns:
            m: "jsonlogs:///measure/_self.jsonl"
          query: >-
            SELECT
              CAST(ts AS TIMESTAMP)                        as timestamp,
              CAST("read.seconds" AS DOUBLE)               as "read.seconds",
              CAST("sitegen.seconds" AS DOUBLE)            as "sitegen.seconds",
              CAST("sitegen_peak_rss.bytes" AS BIGINT)     as "sitegen_peak_rss.bytes"
            FROM m
            ORDER BY timestamp

      - name: "p-noyo-staging"
        factory: "sql-derived-series"
        config:
          patterns:
            m: "jsonlogs:///measure/noyo-staging.jsonl"
          query: &pondseries >-
            SELECT
              CAST(ts AS TIMESTAMP)                        as timestamp,
              CAST("committed.txn_ids" AS BIGINT)          as "committed.txn_ids",
              CAST("parquet.files" AS BIGINT)              as "parquet.files",
              CAST("delta_log.files" AS BIGINT)            as "delta_log.files",
              CAST("size.bytes" AS BIGINT)                 as "size.bytes",
              CAST("list.seconds" AS DOUBLE)               as "list.seconds",
              CAST("peak_rss.bytes" AS BIGINT)             as "peak_rss.bytes",
              CAST("run.seconds" AS DOUBLE)                as "run.seconds",
              CAST("timer.active" AS BIGINT)               as "timer.active",
              CAST("last_run.seconds_ago" AS BIGINT)       as "last_run.seconds_ago"
            FROM m
            ORDER BY timestamp

      - name: "p-noyo-prod"
        factory: "sql-derived-series"
        config:
          patterns:
            m: "jsonlogs:///measure/noyo-prod.jsonl"
          query: *pondseries

      - name: "p-septic-staging"
        factory: "sql-derived-series"
        config:
          patterns:
            m: "jsonlogs:///measure/septic-staging.jsonl"
          query: *pondseries

      - name: "p-septic-prod"
        factory: "sql-derived-series"
        config:
          patterns:
            m: "jsonlogs:///measure/septic-prod.jsonl"
          query: *pondseries

      - name: "p-site-staging"
        factory: "sql-derived-series"
        config:
          patterns:
            m: "jsonlogs:///measure/site-staging.jsonl"
          query: *pondseries

      - name: "p-site-prod"
        factory: "sql-derived-series"
        config:
          patterns:
            m: "jsonlogs:///measure/site-prod.jsonl"
          query: *pondseries

      - name: "p-water-staging"
        factory: "sql-derived-series"
        config:
          patterns:
            m: "jsonlogs:///measure/water-staging.jsonl"
          query: *pondseries

      - name: "p-water-prod"
        factory: "sql-derived-series"
        config:
          patterns:
            m: "jsonlogs:///measure/water-prod.jsonl"
          query: *pondseries

      - name: "p-watershop-selfmon"
        factory: "sql-derived-series"
        config:
          patterns:
            m: "jsonlogs:///measure/watershop-selfmon.jsonl"
          query: *pondseries

      # ── Cross-pond perf series ───────────────────────────────────
      # FULL OUTER JOIN on timestamp, with each input scope-prefixed
      # to <pond>.<param>.<unit>.  This is what sitegen exports and
      # chart.js consumes.
      - name: "perf"
        factory: "timeseries-join"
        config:
          inputs:
            - pattern: "series:///derived/p-_self"
              scope: "_self"
            - pattern: "series:///derived/p-noyo-staging"
              scope: "noyo-staging"
            - pattern: "series:///derived/p-noyo-prod"
              scope: "noyo-prod"
            - pattern: "series:///derived/p-septic-staging"
              scope: "septic-staging"
            - pattern: "series:///derived/p-septic-prod"
              scope: "septic-prod"
            - pattern: "series:///derived/p-site-staging"
              scope: "site-staging"
            - pattern: "series:///derived/p-site-prod"
              scope: "site-prod"
            - pattern: "series:///derived/p-water-staging"
              scope: "water-staging"
            - pattern: "series:///derived/p-water-prod"
              scope: "water-prod"
            - pattern: "series:///derived/p-watershop-selfmon"
              scope: "watershop-selfmon"
---
# Sitegen factory: renders a tiny dashboard from the perf series
# above into /var/www/selfmon/<instance>/ (served by Caddy at
# /selfmon/).  Sitegen runs once per tick from run-selfmon.sh and is
# itself measured -- its memory & runtime cost feeds back into the
# perf series via run-selfmon.sh inline on the *next* tick.
version: v1
kind: mknod
metadata:
  path: /system/etc/sitegen
spec:
  factory: sitegen
  config:
    site:
      title: "Watershop Selfmon"
      base_url: "/selfmon/"
    # Metric instrument-kind registry.  Mirrors the non-gauge entries
    # of the canonical Weaver semconv registry at
    # config/semconv/duckpond-pond.yaml -- keep these in sync.
    # chart.js applies a per-kind transform: counter -> first-difference
    # rate per scope; updowncounter -> identity (today; future: spatial
    # sum); gauge or missing -> identity.
    metric_registry:
      committed.txn_ids: counter
      aborted.txn_ids: counter
      parquet.files: updowncounter
      delta_log.files: updowncounter
      size.bytes: updowncounter
      peak_rss.bytes: updowncounter
      sitegen_peak_rss.bytes: updowncounter
    # Per-chart caption strings keyed the same way as metric_registry.
    # chart.js renders these as a small grey paragraph beneath each
    # chart.  Plain text only (no HTML) -- the client uses textContent.
    metric_captions:
      committed.txn_ids: >-
        Commit rate per pond (transactions/second), derived from the
        running transaction-id counter.  Steady ingestion shows up as
        a flat non-zero rate; spikes correspond to bulk imports or
        backfills.
      parquet.files: >-
        Total parquet files under each pond's data directory.  Rises
        with every commit and drops when compaction merges shards.
      delta_log.files: >-
        Delta-log JSON entries per pond.  Each file is a single
        transaction; checkpointing collapses old entries into a
        snapshot, so this should grow modestly between checkpoints.
      size.bytes: >-
        On-disk footprint of each pond (parquet + delta log + sidecar
        files), measured via du.  Use alongside parquet.files to
        track compaction effectiveness.
      peak_rss.bytes: >-
        Peak resident-set size of the previous tick's `pond run`,
        scraped from the systemd unit's exit log line.  This is the
        ceiling reached by the per-pond ingest, not a steady-state.
      list.seconds: >-
        Wall-clock time for `pond list /` against each pond -- a
        proxy for catalog-walk cost.  Should stay flat with file
        count thanks to incremental list optimizations.
      run.seconds: >-
        Wall-clock duration of the previous tick's `pond run`,
        scraped from the pond CLI's structured "Run summary" exit log
        line.  This is the total time of the most recent timer firing
        per pond -- useful for spotting slowdowns under load (e.g.
        contention with the post-commit backup factory).
      timer.active: >-
        1 if the pond's systemd `.timer` is in the active state, 0
        otherwise.  A flat zero line here means the timer has been
        stopped or disabled and the pond has stopped ingesting --
        catches the silent-failure mode where journal-ingest sees
        no entries because nothing is firing.
      last_run.seconds_ago: >-
        Wall-clock seconds since the pond service's last
        ExecMainExitTimestamp (read from `systemctl show --user`).
        -1 means the service has never run on this host.  Healthy
        ponds stay below 2x their timer interval; a value that
        keeps climbing indicates a stale or stopped pond.
      sitegen.seconds: >-
        Wall-clock time of the dashboard's own sitegen invocation
        each tick (self-referential observability).
      sitegen_peak_rss.bytes: >-
        Peak resident-set size of the dashboard's own sitegen
        invocation each tick.
      read.seconds: >-
        Wall-clock cost of the read-side warm-up performed by the
        selfmon pond itself (sitegen-internal).
    exports:
      - name: "perf"
        pattern: "/derived/perf"
    # Per-pond systemd-style status cards rendered server-side from
    # ingested journal data.  Sitegen lists journal `.jsonl` files
    # matching `journal_pattern`, filters basenames against
    # `unit_globs`, and runs status + tail SQL queries each tick.
    # The `pond_status_grid` shortcode bakes the result into the
    # status page as a static HTML grid of cards.
    status_grid:
      journal_pattern: "jsonlogs:///logs/journal/*.jsonl"
      unit_globs:
        - "user-pond@*.service"
        - "user-pond-selfmon@*.service"
      tail_lines: 10
    routes:
      - name: "home"
        type: template
        slug: "index"
        page: "/system/site/index.md"
        export: "perf"
      - name: "status"
        type: template
        slug: "status"
        page: "/system/site/status.md"
        export: "perf"

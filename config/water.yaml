version: v1
kind: mknod
metadata:
  path: /reduced
spec:
  factory: dynamic-dir
  config:
    # Temporal-reduce configuration for Caspar Water metrics.
    #
    # Dynamic-dir containing five temporal-reduce factories, one per instrument:
    #   - Well depth (Opto 22 / GRV-R7)
    #   - Tank level (concrete storage tank)
    #   - System pressure (main distribution pressure)
    #   - Chlorine level (chlorine tank inventory)
    #   - pH (Atlas Scientific pH probe)
    #
    # Reads from the ingested oteljson series at /ingest/casparwater*.json
    # (populated by logfile-ingest from rotating logs).
    # The glob pattern matches both the active file and all archived rotations.
    #
    # Each entry produces a five-level tree:
    #   <name>/data/res=1m.series
    #   <name>/data/res=10m.series
    #   <name>/data/res=1h.series
    #   <name>/data/res=6h.series
    #   <name>/data/res=1d.series
    #
    # The sitegen export pattern "/reduced/*/*/*.series" matches this structure.
    
    entries:
      # -- Well Depth ---------------------------------------------------------------
      - name: "well-depth"
        factory: "temporal-reduce"
        config:
          in_pattern: "oteljson:///ingest/casparwater*.json"
          out_pattern: "data"
          time_column: "timestamp"
          resolutions: [1m, 10m, 1h, 6h, 1d]
          aggregations:
            - type: "avg"
              columns:
                - "well_depth_value"
            - type: "min"
              columns:
                - "well_depth_value"
            - type: "max"
              columns:
                - "well_depth_value"
    
      # -- Tank Level ---------------------------------------------------------------
      - name: "tank-level"
        factory: "temporal-reduce"
        config:
          in_pattern: "oteljson:///ingest/casparwater*.json"
          out_pattern: "data"
          time_column: "timestamp"
          resolutions: [1m, 10m, 1h, 6h, 1d]
          aggregations:
            - type: "avg"
              columns:
                - "concrete_tank_level_value"
            - type: "min"
              columns:
                - "concrete_tank_level_value"
            - type: "max"
              columns:
                - "concrete_tank_level_value"
    
      # -- System Pressure ----------------------------------------------------------
      - name: "system-pressure"
        factory: "temporal-reduce"
        config:
          in_pattern: "oteljson:///ingest/casparwater*.json"
          out_pattern: "data"
          time_column: "timestamp"
          resolutions: [1m, 10m, 1h, 6h, 1d]
          aggregations:
            - type: "avg"
              columns:
                - "system_pressure_value"
            - type: "min"
              columns:
                - "system_pressure_value"
            - type: "max"
              columns:
                - "system_pressure_value"
    
      # -- Chlorine Level -----------------------------------------------------------
      - name: "chlorine-level"
        factory: "temporal-reduce"
        config:
          in_pattern: "oteljson:///ingest/casparwater*.json"
          out_pattern: "data"
          time_column: "timestamp"
          resolutions: [1m, 10m, 1h, 6h, 1d]
          aggregations:
            - type: "avg"
              columns:
                - "chlorine_level_value"
            - type: "min"
              columns:
                - "chlorine_level_value"
            - type: "max"
              columns:
                - "chlorine_level_value"
    
      # -- pH -----------------------------------------------------------------------
      - name: "ph"
        factory: "temporal-reduce"
        config:
          in_pattern: "oteljson:///ingest/casparwater*.json"
          out_pattern: "data"
          time_column: "timestamp"
          resolutions: [1m, 10m, 1h, 6h, 1d]
          aggregations:
            - type: "avg"
              columns:
                - "atlasph_ph"
            - type: "min"
              columns:
                - "atlasph_ph"
            - type: "max"
              columns:
                - "atlasph_ph"
---
version: v1
kind: mknod
metadata:
  path: /analysis
spec:
  factory: dynamic-dir
  config:
    # Pump cycle analysis configuration for Caspar Water well depth data.
    #
    # Dynamic-dir containing sql-derived-series factories that detect pump
    # on/off cycles from well_depth_value and produce aligned datasets for
    # Horner plot analysis, drawdown/recovery overlay charts, and duty cycle
    # monitoring.
    #
    # The pump cycle detection uses a simple depth threshold (42m):
    #   - Below 42m = pump is on (drawdown phase)
    #   - Above 42m = pump is off (recovery phase)
    #   - Each crossing below 42m starts a new "pump event"
    #
    # Static water level is ~44m; pumping quickly drops below 40m.
    # The 42m threshold cleanly separates pump-on from pump-off with no
    # debounce issues.
    #
    # For LOCAL/REMOTE POND with full OtelJSON data in /ingest/:
    #   pond mknod dynamic-dir /analysis --config-path analysis-remote.yaml
    #
    # For HOSTMOUNT with sample data, see analysis.yaml instead.
    
    entries:
      # -- Pump Cycles ---------------------------------------------------------------
      #
      # Produces one row per 30-second sample with pump event context:
      #   pump_event_id  - integer identifying each pump cycle (draw + recovery)
      #   month          - month of year (1-12) for seasonal coloring
      #   elapsed_s      - seconds since the start of this pump event
      #   drawdown       - meters of drawdown from starting depth (positive = dropping)
      #   depth          - raw well depth in meters
      #   phase          - 'draw' or 'recovery'
      #
      # Capped at 2 hours (7200s) per event to exclude long static periods.
      # Minimum event duration filtering happens at the chart/consumer level.
      #
      # To keep the exported parquet (and the analysis page load) small, the
      # raw 30s samples are decimated to one representative sample per time
      # bucket: 60s buckets for the first 15 minutes (where the drawdown curve
      # is steep and detail matters), then 300s buckets for the long tail.
      #
      - name: "pump-cycles"
        factory: "sql-derived-series"
        config:
          patterns:
            source: "oteljson:///ingest/casparwater*.json"
          query: >-
            WITH raw AS (
              SELECT timestamp, well_depth_value as depth
              FROM source WHERE well_depth_value IS NOT NULL
                AND well_depth_value > 10
                AND well_depth_value < 60
            ),
            classified AS (
              SELECT timestamp, depth,
                CASE WHEN depth < 42.0 THEN true ELSE false END as is_draw,
                LAG(CASE WHEN depth < 42.0 THEN true ELSE false END)
                  OVER (ORDER BY timestamp) as was_draw,
                LAG(timestamp) OVER (ORDER BY timestamp) as prev_timestamp
              FROM raw
            ),
            with_pump_start AS (
              SELECT timestamp, depth, is_draw,
                CASE WHEN is_draw = true AND (was_draw = false OR was_draw IS NULL)
                  THEN 1 ELSE 0
                END as pump_start,
                AVG(depth) OVER (
                  ORDER BY timestamp ROWS BETWEEN 20 PRECEDING AND 10 PRECEDING
                ) as lookback_avg,
                CASE WHEN is_draw = true AND (was_draw = false OR was_draw IS NULL)
                  THEN EXTRACT(EPOCH FROM (timestamp - prev_timestamp))
                  ELSE NULL
                END as gap_at_start
              FROM classified
            ),
            with_event_id AS (
              SELECT timestamp, depth, is_draw,
                SUM(pump_start) OVER (ORDER BY timestamp ROWS UNBOUNDED PRECEDING)
                  as pump_event_id,
                CASE WHEN pump_start = 1 THEN lookback_avg ELSE NULL END as static_at_start,
                gap_at_start
              FROM with_pump_start
            ),
            filtered AS (
              SELECT * FROM with_event_id WHERE pump_event_id > 0
            ),
            with_meta AS (
              SELECT timestamp, depth, is_draw, pump_event_id,
                FIRST_VALUE(timestamp) OVER (
                  PARTITION BY pump_event_id ORDER BY timestamp
                ) as event_start,
                MAX(static_at_start) OVER (
                  PARTITION BY pump_event_id
                ) as static_depth,
                MAX(gap_at_start) OVER (
                  PARTITION BY pump_event_id
                ) as start_gap_s
              FROM filtered
            ),
            long_enough AS (
              SELECT pump_event_id
              FROM with_meta
              WHERE is_draw = true
              GROUP BY pump_event_id
              HAVING COUNT(*) >= 40
            ),
            clean_start AS (
              SELECT pump_event_id
              FROM with_meta
              WHERE EXTRACT(EPOCH FROM (timestamp - event_start)) < 60
              GROUP BY pump_event_id
              HAVING MIN(depth) >= 40.0
            ),
            real_drawdown AS (
              SELECT pump_event_id
              FROM with_meta
              GROUP BY pump_event_id
              HAVING MAX(static_depth) - MIN(depth) >= 1.5
            ),
            not_stale AS (
              SELECT pump_event_id
              FROM with_meta
              GROUP BY pump_event_id
              HAVING MAX(CASE WHEN EXTRACT(EPOCH FROM (timestamp - event_start)) < 30
                       THEN depth END)
                   - MIN(CASE WHEN EXTRACT(EPOCH FROM (timestamp - event_start))
                       BETWEEN 270 AND 330 THEN depth END) >= 0.3
            ),
            selected AS (
              SELECT
                timestamp,
                CAST(m.pump_event_id AS INT) as pump_event_id,
                CAST(EXTRACT(MONTH FROM event_start) AS INT) as month,
                EXTRACT(EPOCH FROM (timestamp - event_start)) as elapsed_s,
                depth,
                static_depth,
                CASE WHEN is_draw THEN 'draw' ELSE 'recovery' END as phase
              FROM with_meta m
              INNER JOIN long_enough le ON m.pump_event_id = le.pump_event_id
              INNER JOIN clean_start cs ON m.pump_event_id = cs.pump_event_id
              INNER JOIN real_drawdown rd ON m.pump_event_id = rd.pump_event_id
              INNER JOIN not_stale ns ON m.pump_event_id = ns.pump_event_id
              WHERE EXTRACT(EPOCH FROM (timestamp - event_start)) <= 7200
                AND static_depth BETWEEN 40.0 AND 50.0
                AND (start_gap_s IS NULL OR start_gap_s < 300)
            ),
            resampled AS (
              SELECT *,
                CASE WHEN elapsed_s < 900
                     THEN CAST(FLOOR(elapsed_s / 60) AS INT)
                     ELSE 15 + CAST(FLOOR((elapsed_s - 900) / 300) AS INT)
                END as time_bucket
              FROM selected
            ),
            decimated AS (
              SELECT *,
                ROW_NUMBER() OVER (
                  PARTITION BY pump_event_id, time_bucket ORDER BY timestamp
                ) as bucket_rn
              FROM resampled
            )
            SELECT timestamp, pump_event_id, month, elapsed_s, depth, static_depth, phase
            FROM decimated
            WHERE bucket_rn = 1
            ORDER BY timestamp
    
      # -- Cycle Summary -------------------------------------------------------------
      #
      # One row per pump event with aggregate stats for filtering and analysis:
      #   pump_event_id  - matches pump-cycles table
      #   event_start    - timestamp of cycle start
      #   month          - month of year for seasonal grouping
      #   draw_duration_s     - seconds spent in drawdown phase
      #   recovery_duration_s - seconds until depth returns above threshold
      #   total_duration_s    - total event duration (capped at 7200s)
      #   max_drawdown        - peak drawdown in meters
      #   depth_at_start      - well depth at cycle start
      #   min_depth           - minimum depth reached during pumping
      #   num_points          - number of data points in this cycle
      #
      - name: "cycle-summary"
        factory: "sql-derived-series"
        config:
          patterns:
            source: "oteljson:///ingest/casparwater*.json"
          query: >-
            WITH raw AS (
              SELECT timestamp, well_depth_value as depth
              FROM source WHERE well_depth_value IS NOT NULL
            ),
            classified AS (
              SELECT timestamp, depth,
                CASE WHEN depth < 42.0 THEN true ELSE false END as is_draw,
                LAG(CASE WHEN depth < 42.0 THEN true ELSE false END)
                  OVER (ORDER BY timestamp) as was_draw,
                LAG(timestamp) OVER (ORDER BY timestamp) as prev_timestamp
              FROM raw
            ),
            with_pump_start AS (
              SELECT timestamp, depth, is_draw,
                CASE WHEN is_draw = true AND (was_draw = false OR was_draw IS NULL)
                  THEN 1 ELSE 0
                END as pump_start,
                AVG(depth) OVER (
                  ORDER BY timestamp ROWS BETWEEN 20 PRECEDING AND 10 PRECEDING
                ) as lookback_avg,
                CASE WHEN is_draw = true AND (was_draw = false OR was_draw IS NULL)
                  THEN EXTRACT(EPOCH FROM (timestamp - prev_timestamp))
                  ELSE NULL
                END as gap_at_start
              FROM classified
            ),
            with_event_id AS (
              SELECT timestamp, depth, is_draw,
                SUM(pump_start) OVER (ORDER BY timestamp ROWS UNBOUNDED PRECEDING)
                  as pump_event_id,
                CASE WHEN pump_start = 1 THEN lookback_avg ELSE NULL END as static_at_start,
                gap_at_start
              FROM with_pump_start
            ),
            filtered AS (
              SELECT * FROM with_event_id WHERE pump_event_id > 0
            ),
            with_meta AS (
              SELECT timestamp, depth, is_draw, pump_event_id,
                FIRST_VALUE(timestamp) OVER (
                  PARTITION BY pump_event_id ORDER BY timestamp
                ) as event_start,
                FIRST_VALUE(depth) OVER (
                  PARTITION BY pump_event_id ORDER BY timestamp
                ) as depth_at_start,
                MAX(static_at_start) OVER (
                  PARTITION BY pump_event_id
                ) as static_depth,
                MAX(gap_at_start) OVER (
                  PARTITION BY pump_event_id
                ) as start_gap_s
              FROM filtered
            ),
            capped AS (
              SELECT * FROM with_meta
              WHERE EXTRACT(EPOCH FROM (timestamp - event_start)) <= 7200
                AND static_depth BETWEEN 40.0 AND 50.0
                AND (start_gap_s IS NULL OR start_gap_s < 300)
            ),
            per_event AS (
              SELECT
                CAST(pump_event_id AS INT) as pump_event_id,
                MIN(timestamp) as timestamp,
                CAST(EXTRACT(MONTH FROM MIN(event_start)) AS INT) as month,
                CAST(EXTRACT(DOY FROM MIN(event_start)) AS INT) as day_of_year,
                SUM(CASE WHEN is_draw THEN 1 ELSE 0 END) * 30.0 as draw_duration_s,
                SUM(CASE WHEN NOT is_draw THEN 1 ELSE 0 END) * 30.0 as recovery_duration_s,
                COUNT(*) * 30.0 as total_duration_s,
                MAX(depth_at_start - depth) as max_drawdown,
                MIN(depth_at_start) as depth_at_start,
                MIN(static_depth) as static_depth,
                MIN(depth) as min_depth,
                CAST(COUNT(*) AS INT) as num_points
              FROM capped
              GROUP BY pump_event_id
              HAVING SUM(CASE WHEN is_draw THEN 1 ELSE 0 END) >= 40
            ),
            with_interval AS (
              SELECT pe.*,
                EXTRACT(EPOCH FROM (
                  LEAD(pe.timestamp) OVER (ORDER BY pe.timestamp) - pe.timestamp
                )) as inter_pump_s
              FROM per_event pe
            )
            SELECT wi.*,
              CASE WHEN inter_pump_s > 0
                THEN draw_duration_s / inter_pump_s
                ELSE NULL
              END as duty_cycle
            FROM with_interval wi
            ORDER BY timestamp
---
version: v1
kind: mknod
metadata:
  path: /annotations
spec:
  factory: dynamic-dir
  config:
    # Overlay interval series for Caspar Water.
    #
    # These sql-derived-series produce *interval* datasets (one row per period)
    # rather than per-sample timeseries.  The sitegen "annotation layer" reads
    # them as shaded background bands drawn behind any timeseries chart on the
    # same pond (see site.yaml: the `water-overlay` export bound via
    # `annotations:` on the water data route).
    #
    # Kept in a dedicated dynamic-dir (not /analysis) so the analysis overlay
    # route does not generate a page for them.
    entries:
      # -- Water system overlay (merged system-status timeline) ----------------------
      #
      # A single merged timeline where each row is a pump-state segment that also
      # carries the prevailing (previous-day) leak-probability estimate.  Two
      # visual overlays are derived from its columns by the client (chart.js):
      #   * pump state (pumping vs recovery) -- categorical shading
      #   * leak risk  -- red shading with opacity proportional to leak_score
      # selectable independently via checkboxes on any water timeseries.
      #
      # Columns:
      #   timestamp       - copy of start_time (temporal-export/partition key)
      #   start_time      - pump-state change (segment start, TIMESTAMP)
      #   end_time        - next pump-state change (segment end, TIMESTAMP)
      #   pump_state      - 'pumping' (well depth < threshold) | 'recovery'
      #   leak_score      - previous-day P(leak) in [0,1] (NULL if no estimate)
      #   leak_label      - 'leak' (score >= 0.5) | 'no-leak' | NULL
      #   leak_confidence - cumulative-evidence weight in [0,1]
      #
      # Pump state: well_depth_value < 42 m => pumping (same threshold and
      # signal as the duty-cycle / pump-cycle analysis).
      #
      # Leak score (v4 -- ground-truth validated against a real leak): the
      # system pressure is measured near the main service meter and is NOISY
      # (tank level, a constant pH circulation pump, user faucets, and nightly
      # self-flushing town filters all move it).  A LEAK shows up as a slow,
      # steady DOWNWARD pressure slope while nobody is drawing water; a
      # non-leak holds ~flat.  The tank-level sensor lacks the resolution to
      # see this small (~500 gal/day) drain, but the noisy pressure sensor does.
      #
      # Key detail (v4): the reliable moment is the nightly STATIC period -- when
      # no faucet/hose is running, the pressure trace becomes noticeably smoother
      # (its variance collapses).  When users are active, variance is high and
      # the trace is worthless for leak inference.  So instead of trusting the
      # whole overnight window (whose single slope fit is corrupted by the tank
      # refill jump AND by user draws), we isolate the quietest stretch.  Using
      # the reduced 1-minute series -- whose per-minute .max-.min range is a
      # built-in within-minute roughness measure -- we restrict to UTC 05-14
      # (~22:00-07:00 Pacific) while the pump is OFF (well depth >= 42 ft),
      # smooth the range over +/-5 min, keep only quiet minutes (< 0.03 psi),
      # take the LONGEST contiguous quiet run of the night (>= 60 min) and fit
      # one signed slope over it.  Falling pressure during that static period,
      # with no demand, is the leak signature.  leak_score maps the fall rate
      # through a sigmoid (0.005 psi/h fall = 0.5, scale 0.0025); leak_confidence
      # scales with the quiet-run length (target ~4 h) and quietness.  Removing
      # the constant circulation-pump bias means a sound main reads ~0 psi/h.
      # The per-day score is joined onto each pump-state segment from the
      # PREVIOUS day.
      #
      # Calibration (real leak, ~May 2026 -> repaired 2026-07-10; the June 24
      # "host left running" event made it especially noticeable): validated on
      # the reduced staging series May 15 - Jul 17 2026.  With the static-period
      # model ~46% of true-leak nights score >=0.5 while ZERO of the seven
      # post-repair nights do -- and the score drops sharply the night after the
      # repair (0.72-1.00 on Jul 4-10, then <=0.27 on Jul 11-17).  This
      # asymmetry matches how the signal reads: a single high night is weak
      # (need several consecutive leak nights to be confident), but a single
      # clean no-leak night is strong evidence the main is not leaking.
      #
      - name: "water-overlay"
        factory: "sql-derived-series"
        config:
          patterns:
            pressure: "series:///reduced/system-pressure/data/res=1m.series"
            depth: "series:///reduced/well-depth/data/res=1m.series"
          query: >-
            WITH samples AS (
              SELECT timestamp, "well_depth_value.avg" AS depth
              FROM depth
              WHERE "well_depth_value.avg" IS NOT NULL
                AND "well_depth_value.avg" BETWEEN 10 AND 60
            ),
            state AS (
              SELECT timestamp,
                CASE WHEN depth < 42.0 THEN 'pumping' ELSE 'recovery' END AS pump_state
              FROM samples
            ),
            changes AS (
              SELECT timestamp, pump_state,
                LAG(pump_state) OVER (ORDER BY timestamp) AS prev_state
              FROM state
            ),
            seg AS (
              SELECT timestamp, pump_state,
                SUM(CASE WHEN prev_state IS NULL OR prev_state <> pump_state
                         THEN 1 ELSE 0 END)
                  OVER (ORDER BY timestamp ROWS UNBOUNDED PRECEDING) AS seg_id
              FROM changes
            ),
            segments AS (
              SELECT seg_id, MIN(pump_state) AS pump_state,
                MIN(timestamp) AS start_time, MAX(timestamp) AS last_ts
              FROM seg GROUP BY seg_id
            ),
            segments2 AS (
              SELECT seg_id, pump_state, start_time,
                COALESCE(LEAD(start_time) OVER (ORDER BY start_time), last_ts) AS end_time
              FROM segments
            ),
            night AS (
              SELECT p.timestamp,
                "system_pressure_value.avg" AS pressure,
                "system_pressure_value.max" - "system_pressure_value.min" AS rng,
                d."well_depth_value.avg" AS depth,
                CAST(p.timestamp AS DATE) AS rest_day,
                CAST(EXTRACT(EPOCH FROM p.timestamp)/60 AS BIGINT) AS min_idx
              FROM pressure p JOIN depth d USING (timestamp)
              WHERE "system_pressure_value.avg" IS NOT NULL
                AND d."well_depth_value.avg" IS NOT NULL
                AND EXTRACT(HOUR FROM p.timestamp) BETWEEN 5 AND 14
            ),
            off AS (
              SELECT *, AVG(rng) OVER (
                  PARTITION BY rest_day ORDER BY min_idx
                  RANGE BETWEEN 5 PRECEDING AND 5 FOLLOWING) AS act
              FROM night WHERE depth >= 42.0
            ),
            quiet AS (
              SELECT *,
                min_idx - ROW_NUMBER() OVER (PARTITION BY rest_day ORDER BY min_idx)
                  AS island
              FROM off WHERE act < 0.03
            ),
            night_seg AS (
              SELECT rest_day, island, COUNT(*) AS n,
                (MAX(min_idx) - MIN(min_idx)) AS span_min,
                regr_slope(pressure, EXTRACT(EPOCH FROM timestamp)/3600.0) AS slope,
                AVG(act) AS mean_act
              FROM quiet
              GROUP BY rest_day, island
              HAVING COUNT(*) >= 30 AND (MAX(min_idx) - MIN(min_idx)) >= 60
            ),
            longest AS (
              SELECT rest_day, slope, span_min, mean_act,
                ROW_NUMBER() OVER (PARTITION BY rest_day
                  ORDER BY span_min DESC, n DESC) AS rk
              FROM night_seg
            ),
            per_day AS (
              SELECT rest_day,
                1.0/(1.0+exp(-(((-slope)-0.005)/0.0025))) AS leak_score,
                LEAST(span_min/240.0, 1.0) * (0.012/(0.012 + mean_act))
                  AS leak_confidence
              FROM longest
              WHERE rk = 1
            ),
            merged AS (
              SELECT s.start_time, s.end_time, s.pump_state,
                d.leak_score,
                CASE WHEN d.leak_score IS NULL THEN NULL
                     WHEN d.leak_score >= 0.5 THEN 'leak' ELSE 'no-leak' END AS leak_label,
                d.leak_confidence
              FROM segments2 s
              LEFT JOIN per_day d
                ON d.rest_day = CAST(CAST(s.start_time AS DATE) - INTERVAL '1 day' AS DATE)
            )
            SELECT start_time AS timestamp, start_time, end_time, pump_state,
              leak_score, leak_label, leak_confidence
            FROM merged
            ORDER BY start_time
            merged AS (
              SELECT s.start_time, s.end_time, s.pump_state,
                d.leak_score,
                CASE WHEN d.leak_score IS NULL THEN NULL
                     WHEN d.leak_score >= 0.5 THEN 'leak' ELSE 'no-leak' END AS leak_label,
                d.leak_confidence
              FROM segments2 s
              LEFT JOIN per_day d
                ON d.rest_day = CAST(CAST(s.start_time AS DATE) - INTERVAL '1 day' AS DATE)
            )
            SELECT start_time AS timestamp, start_time, end_time, pump_state,
              leak_score, leak_label, leak_confidence
            FROM merged
            ORDER BY start_time
---
version: v1
kind: mknod
metadata:
  path: /leak
spec:
  factory: dynamic-dir
  config:
    # Leak-analysis timeseries for Caspar Water.
    #
    # Unlike the /annotations water-overlay (which emits interval bands merged
    # onto pump-state segments), this dynamic-dir emits a plain per-DAY
    # timeseries: one row per night with the fitted overnight drawdown rate and
    # the derived leak probability.  It is rendered as a normal time-series
    # chart (viz renderer="chart") on the Leak Analysis page and is selectable
    # in the data explorer, so the leak signal can be zoomed out over the full
    # history the same way any instrument metric is.
    #
    # The model is identical to the water-overlay leak score (v4, ground-truth
    # validated -- see the /annotations comment).  The key idea (v4): the water
    # system has a distinctive STATIC period each night when nobody is drawing
    # water -- the pressure signal becomes noticeably smoother (its variance
    # collapses).  When users are active (faucets opening/closing, hoses left
    # running), variance is high and the pressure trace is unreliable for
    # leak inference.  So we isolate the quietest stretch and fit the slope
    # only there:
    #   1. read the reduced 1-minute system-pressure and well-depth series
    #      (each minute carries .avg plus .min/.max, so max-min is a built-in
    #      within-minute activity/roughness measure -- no raw scan needed);
    #   2. restrict to the overnight window (UTC 05-14) while the well pump is
    #      OFF (well depth >= 42 ft);
    #   3. smooth the per-minute pressure range over +/-5 min and keep only
    #      "quiet" minutes (rolling range < 0.03 psi);
    #   4. take the LONGEST contiguous quiet run of the night (>= 60 min) and
    #      fit one signed slope (regr_slope of pressure vs hours) over it.
    # drawdown_rate is the fall rate (= -slope, psi/h; higher = faster fall =
    # leak); leak_score maps it through a sigmoid (0.005 psi/h => 0.5, scale
    # 0.0025); leak_confidence scales with the quiet-run length (target ~4 h)
    # and quietness.  Because the static-period selection removes the constant
    # circulation-pump bias, a sound main reads ~0 psi/h (flat) and a leak
    # reads clearly positive.  See the /annotations block for calibration.
    #
    # NOTE: this daily series is derived and cannot be temporally reduced, but
    # it is already one point per day (~365/yr), so it needs no reduction to
    # display a multi-year zoom-out.  When the sensor's configuration changes
    # (system-pressure sensor live ~2024-04-07; constant-draw pH circulation
    # pump live ~2024-06-06; any elevation move), the calibration differs and
    # such epochs should be computed separately and stitched with a
    # timeseries-join.  This entry covers the current (post-circ-pump) epoch.
    entries:
      - name: "leak-analysis"
        factory: "sql-derived-series"
        config:
          patterns:
            pressure: "series:///reduced/system-pressure/data/res=1m.series"
            depth: "series:///reduced/well-depth/data/res=1m.series"
          query: >-
            WITH night AS (
              SELECT p.timestamp,
                "system_pressure_value.avg" AS pressure,
                "system_pressure_value.max" - "system_pressure_value.min" AS rng,
                d."well_depth_value.avg" AS depth,
                CAST(p.timestamp AS DATE) AS rest_day,
                CAST(EXTRACT(EPOCH FROM p.timestamp)/60 AS BIGINT) AS min_idx
              FROM pressure p JOIN depth d USING (timestamp)
              WHERE "system_pressure_value.avg" IS NOT NULL
                AND d."well_depth_value.avg" IS NOT NULL
                AND EXTRACT(HOUR FROM p.timestamp) BETWEEN 5 AND 14
            ),
            off AS (
              SELECT *, AVG(rng) OVER (
                  PARTITION BY rest_day ORDER BY min_idx
                  RANGE BETWEEN 5 PRECEDING AND 5 FOLLOWING) AS act
              FROM night WHERE depth >= 42.0
            ),
            quiet AS (
              SELECT *,
                min_idx - ROW_NUMBER() OVER (PARTITION BY rest_day ORDER BY min_idx)
                  AS island
              FROM off WHERE act < 0.03
            ),
            seg AS (
              SELECT rest_day, island, COUNT(*) AS n,
                (MAX(min_idx) - MIN(min_idx)) AS span_min,
                regr_slope(pressure, EXTRACT(EPOCH FROM timestamp)/3600.0) AS slope,
                AVG(act) AS mean_act
              FROM quiet
              GROUP BY rest_day, island
              HAVING COUNT(*) >= 30 AND (MAX(min_idx) - MIN(min_idx)) >= 60
            ),
            longest AS (
              SELECT rest_day, slope, span_min, mean_act,
                ROW_NUMBER() OVER (PARTITION BY rest_day
                  ORDER BY span_min DESC, n DESC) AS rk
              FROM seg
            )
            SELECT
              CAST(rest_day AS TIMESTAMP) AS timestamp,
              -slope AS drawdown_rate,
              1.0/(1.0+exp(-(((-slope)-0.005)/0.0025))) AS leak_score,
              LEAST(span_min/240.0, 1.0) * (0.012/(0.012 + mean_act))
                AS leak_confidence
            FROM longest
            WHERE rk = 1
            ORDER BY timestamp

version: v1
kind: mkdir
metadata:
  path: /ingest
---
version: v1
kind: mknod
metadata:
  path: /etc/ingest
spec:
  factory: logfile-ingest
  config:
    archived_pattern: /data/casparwater-*.json
    active_pattern: /data/casparwater.json
    pond_path: /ingest

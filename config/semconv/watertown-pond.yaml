#
# Self-monitoring metrics for watertown ponds.
#
# Convention reminder.  The selfmon collector writes per-pond JSON
# rows whose column names are the metric_name values defined here
# (`committed.txn_ids`, `parquet.files`, ...).  The
# `timeseries-join` factory then prefixes each input's columns with
# its `scope`, producing wide columns of shape
# `<scope>.<param>.<unit>` (e.g. `water-staging.parquet.files`).
# chart.js groups by the `<param>.<unit>` suffix into one panel per
# metric, with one line per scope.
#
# Default instrument kind is `gauge`; only non-gauge metrics need
# entries here.  `list.seconds`, `read.seconds`, `sitegen.seconds`
# etc. are gauges and intentionally omitted.

groups:
  # ── Attributes ───────────────────────────────────────────────────

  - id: registry.watertown
    type: attribute_group
    brief: "Identification attributes for watertown self-monitoring."
    stability: experimental
    attributes:
      - id: watertown.pond.scope
        type: string
        stability: experimental
        brief: >
          Pond instance name.  Used as the column-name prefix when
          per-pond series are joined into a wide table by the
          `timeseries-join` factory.
        examples:
          - water-staging
          - water-prod
          - noyo-staging
          - noyo-prod
          - septic-staging
          - septic-prod
          - site-staging
          - site-prod
          - watershop-selfmon
        requirement_level: required

      - id: watertown.process.scope
        type: string
        stability: experimental
        brief: >
          Selfmon-process scope, used for metrics that describe the
          collector or sitegen run itself rather than a particular
          pond.
        examples: [selfmon]
        requirement_level: required

  # ── Per-pond counters (monotonic) ────────────────────────────────

  - id: metric.watertown.pond.committed
    type: metric
    metric_name: committed.txn_ids
    stability: experimental
    brief: "Cumulative count of transactions committed to a pond."
    instrument: counter
    unit: "{txn_id}"
    attributes:
      - ref: watertown.pond.scope

  - id: metric.watertown.pond.aborted
    type: metric
    metric_name: aborted.txn_ids
    stability: experimental
    brief: "Cumulative count of transactions aborted before commit."
    instrument: counter
    unit: "{txn_id}"
    attributes:
      - ref: watertown.pond.scope

  # ── Per-pond updowncounters (current-state, summable) ────────────

  - id: metric.watertown.pond.parquet
    type: metric
    metric_name: parquet.files
    stability: experimental
    brief: "Number of *.parquet files currently in the pond's backing store."
    note: >
      Grows with every commit and shrinks after compaction.  A
      coarse signal for linear-time list/scan cost.
    instrument: updowncounter
    unit: "{file}"
    attributes:
      - ref: watertown.pond.scope

  - id: metric.watertown.pond.delta_log
    type: metric
    metric_name: delta_log.files
    stability: experimental
    brief: "Number of delta-log JSON files currently under any `_delta_log/` directory in the pond."
    note: >
      Cleaned up by checkpointing.  Grows with every commit until a
      checkpoint compacts the log.
    instrument: updowncounter
    unit: "{file}"
    attributes:
      - ref: watertown.pond.scope

  - id: metric.watertown.pond.size
    type: metric
    metric_name: size.bytes
    stability: experimental
    brief: "Total bytes occupied by the pond's backing store."
    instrument: updowncounter
    unit: "By"
    attributes:
      - ref: watertown.pond.scope

  - id: metric.watertown.pond.peak_rss
    type: metric
    metric_name: peak_rss.bytes
    stability: experimental
    brief: >
      Peak resident set size observed for pond CLI invocations during
      the previous selfmon tick (one tick lag).
    note: >
      Sourced from the `Peak memory usage: N MB` line that pond
      writes to stderr at process exit.  The selfmon tick takes the
      max across that tick's invocations.  Unit is bytes despite the
      MB-formatted source, because storage is canonical (renderer
      may scale for display).
    instrument: updowncounter
    unit: "By"
    attributes:
      - ref: watertown.pond.scope

  # ── Selfmon-process scope (no pond attribute) ────────────────────

  - id: metric.watertown.sitegen.peak_rss
    type: metric
    metric_name: sitegen_peak_rss.bytes
    stability: experimental
    brief: "Peak resident set size observed during the most recent sitegen pass."
    instrument: updowncounter
    unit: "By"
    attributes:
      - ref: watertown.process.scope

  # ── Status-only liveness fields ──────────────────────────────────
  #
  # These are gauges (default kind, no metric_registry entry needed)
  # but they're documented here for completeness because the status
  # grid renderer in sitegen treats them as authoritative inputs to
  # the per-pond health classification.  They originate in
  # measure-pond.sh's systemctl probes rather than the pond CLI.

  - id: metric.watertown.pond.timer_interval
    type: metric
    metric_name: timer.interval_s
    stability: experimental
    brief: >
      Configured systemd `OnUnitActiveSec` for the pond's `.timer`
      unit, in integer seconds.
    note: >
      Captured by `measure-pond.sh` from `systemctl --user show
      <unit>.timer -p OnUnitActiveSecUSec`.  The selfmon status
      grid uses 2x this value as the threshold for marking a card
      yellow ("overdue").  Reported as 0 when the timer is missing
      or the interval is unset.
    instrument: gauge
    unit: "s"
    attributes:
      - ref: watertown.pond.scope

  - id: metric.watertown.pond.run_wall
    type: metric
    metric_name: run.wall_s
    stability: experimental
    brief: >
      Wall-clock duration of the pond service's most recent run, in
      integer seconds.
    note: >
      Captured by `measure-pond.sh` as `ExecMainExitTimestamp -
      ExecMainStartTimestamp` from `systemctl --user show <unit>`.
      The selfmon status grid adds this to `timer.interval_s` before
      applying its 2x "overdue" threshold, because with
      `OnUnitActiveSec` the true period between successful runs is
      `interval + run duration`; without it, a unit whose run outlasts
      its timer interval would be permanently marked yellow.  Reported
      as 0 when the timestamps are missing or the service is mid-run.
    instrument: gauge
    unit: "s"
    attributes:
      - ref: watertown.pond.scope

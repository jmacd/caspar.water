version: v1
kind: mkdir
metadata:
  path: /system/etc
---
version: v1
kind: mkdir
metadata:
  path: /sources
---
version: v1
kind: mknod
metadata:
  path: /system/etc/05-git
spec:
  factory: git-ingest
  config:
    url: "https://github.com/jmacd/caspar.water.git"
    ref: "${env:GIT_REF:-main}"
    prefix: "site"
    pond_path: "/"
---
version: v1
kind: mknod
metadata:
  path: /system/etc/10-water
spec:
  factory: remote
  config:
    region: "${env:S3_REGION}"
    url: "${env:WATER_S3_URL}"
    endpoint: "${env:S3_ENDPOINT}"
    access_key: "${env:S3_ACCESS_KEY}"
    secret_key: "${env:S3_SECRET_KEY}"
    allow_http: ${env:S3_ALLOW_HTTP:-false}
    import:
      source_path: "/**"
      local_path: "/sources/water"
---
version: v1
kind: mknod
metadata:
  path: /system/etc/11-noyo
spec:
  factory: remote
  config:
    region: "${env:S3_REGION}"
    url: "${env:NOYO_S3_URL}"
    endpoint: "${env:S3_ENDPOINT}"
    access_key: "${env:S3_ACCESS_KEY}"
    secret_key: "${env:S3_SECRET_KEY}"
    allow_http: ${env:S3_ALLOW_HTTP:-false}
    import:
      source_path: "/**"
      local_path: "/sources/noyo"
---
version: v1
kind: mknod
metadata:
  path: /system/etc/12-septic
spec:
  factory: remote
  config:
    region: "${env:S3_REGION}"
    url: "${env:SEPTIC_S3_URL}"
    endpoint: "${env:S3_ENDPOINT}"
    access_key: "${env:S3_ACCESS_KEY}"
    secret_key: "${env:S3_SECRET_KEY}"
    allow_http: ${env:S3_ALLOW_HTTP:-false}
    import:
      source_path: "/**"
      local_path: "/sources/septic"
---
version: v1
kind: mknod
metadata:
  path: /system/etc/90-sitegen
spec:
  factory: sitegen
  config:
    
    site:
      title: "Caspar Water"
      base_url: "${env:SITE_BASE_URL:-/}"
      site_url: "https://casparwater.us"
      github_url: "https://github.com/jmacd/duckpond"
    
    content:
      - name: "pages"
        pattern: "/content/*.md"
    
    exports:
      - name: "metrics"
        pattern: "/sources/water/reduced/*/*/*.series"
      - name: "analysis"
        pattern: "/sources/water/analysis/*"
      - name: "septic-metrics"
        pattern: "/sources/septic/reduced/*/*/*.series"
    
    subsites:
      - name: "noyo"
        path: "/sources/noyo"
        config: "/system/etc/90-sitegen"
        base_url: "${env:SITE_BASE_URL:-/}noyo-harbor/"
    
    routes:
      - name: "home"
        type: static
        slug: ""
        page: "/templates/index.md"
        routes:
          - name: "pages"
            type: content
            slug: ""
            content: "pages"
          - name: "data"
            type: static
            slug: "data"
            routes:
              - name: "metric-detail"
                type: template
                slug: "$0"
                page: "/templates/data.md"
                export: "metrics"
          - name: "analysis"
            type: static
            slug: "analysis"
            routes:
              - name: "analysis-detail"
                type: template
                slug: "$0"
                page: "/templates/analysis.md"
                export: "analysis"
          - name: "septic"
            type: static
            slug: "septic"
            routes:
              - name: "septic-detail"
                type: template
                slug: "$0"
                page: "/templates/data.md"
                export: "septic-metrics"
    
    partials:
      sidebar: "/templates/sidebar.md"
    
    static:
      - pattern: "/img/*"
    
    theme:
      bg-image: "none"
    
    sidebar:
      - "Political"
      - "Blog"
      - "History"
      - "Water"
      - label: "System"
        children:
          - label: "Pump Cycles"
            href: "${env:SITE_BASE_URL:-/}analysis/pump-cycles.html"
      - label: "Monitoring"
        children:
          - label: "Well Depth"
            href: "${env:SITE_BASE_URL:-/}data/well-depth.html"
          - label: "Tank Level"
            href: "${env:SITE_BASE_URL:-/}data/tank-level.html"
          - label: "System Pressure"
            href: "${env:SITE_BASE_URL:-/}data/system-pressure.html"
          - label: "Chlorine Level"
            href: "${env:SITE_BASE_URL:-/}data/chlorine-level.html"
          - label: "pH"
            href: "${env:SITE_BASE_URL:-/}data/ph.html"
      - label: "Septic"
        children:
          - label: "Pump Amps"
            href: "${env:SITE_BASE_URL:-/}septic/pumps.html"
          - label: "Cycle Times"
            href: "${env:SITE_BASE_URL:-/}septic/cycle-times.html"
          - label: "Environment"
            href: "${env:SITE_BASE_URL:-/}septic/environment.html"
      - label: "Noyo Harbor"
        href: "${env:SITE_BASE_URL:-/}noyo-harbor/"
      - "Software"
      - "Operator"
      - "Thanks"

# Historical monthly meter readings, committed as a tidy CSV
# (history/monthly_usage.csv, generated by history/monthly_to_usage.py).
version: v1
kind: mknod
metadata:
  path: /history-src
spec:
  factory: git-ingest
  config:
    url: "https://github.com/jmacd/caspar.water.git"
    ref: "${env:GIT_REF:-main}"
    prefix: "history"
---
# Two monthly water-usage rate series derived from the committed cumulative CSV
# via the generic csv:// format provider. Each entry is a single
# sql-derived-series node (like /analysis) that sitegen reads lazily at build
# time and exports. The CSV holds cumulative meter totals (the faithful record,
# already gap-cleaned by the script); the LAG() delta here turns them into
# monthly usage. Null cumulative months yield null deltas, so data-quality gaps
# pass straight through to the chart instead of becoming spurious spikes.
version: v1
kind: mknod
metadata:
  path: /history
spec:
  factory: dynamic-dir
  config:
    entries:
      # Main service: delivered/pumped RATE in gallons per minute, two lines on
      # one chart.  Both are plain gpm gauges (no counter transform), each an
      # average rate over its aligned interval = gallons in that interval
      # divided by the interval's minutes.  Storing usage as a summable count of
      # gallons per aligned interval (not a rate) is what makes this work: a
      # coarser interval simply holds more gallons, and dividing by its (longer)
      # minute-span renders the same gpm at any smoothing level -- the aggregate
      # rate the whole interval averages to (pumping bursts spread over the idle
      # time in between).
      #
      #   metered.usage.gpm -- the source of truth: consecutive cumulative
      #     main-service encoder reads differenced into gallons used that month,
      #     divided by the minutes between reads.  Reads are ~last Tuesday and
      #     encode the prior month, so the delta ending at a month-start reading
      #     is the preceding month's usage.  Rendered as a piecewise-constant
      #     STAIRCASE: the month's average gpm is densified onto a daily spine
      #     (one flat point per day across the month, stepping at each reading)
      #     so the flat average-rate segment stays visible at any zoom -- a bare
      #     monthly point would vanish when zoomed inside a month because the
      #     chart drops points outside the visible window.  Full history to 2017
      #     (a gallon count needs no pump-state).
      #   modeled.usage.gpm -- the live estimate: modeled gallons pumped per DAY
      #     (well-usage-daily, SUM of K/H(depth) per minute while pumping, since
      #     the 2024-02-15 configuration) divided by 1440 minutes/day.  A daily
      #     interval smooths the ~0<->13 gpm pumping duty into a clean per-day
      #     average that tracks the monthly meter (~0.6-1.4 gpm), while still
      #     updating every day right up to the present.
      #
      # The daily metered staircase runs through the finer daily modeled
      # texture; aggregating either coarser converges them.  y-axis is gpm.
      - name: "main-meter"
        factory: "sql-derived-series"
        config:
          patterns:
            meter: "csv:///history-src/monthly_usage.csv"
            daily: "series:///sources/water/usage/well-usage-daily"
          query: >-
            WITH reads AS (
              SELECT CAST(timestamp AS TIMESTAMP) AS ts, main_meter,
                LAG(CAST(timestamp AS TIMESTAMP)) OVER (ORDER BY timestamp)
                  AS pts,
                LAG(main_meter) OVER (ORDER BY timestamp) AS pmm
              FROM meter
            ),
            intervals AS (
              SELECT pts, ts,
                CAST(main_meter - pmm AS DOUBLE)
                  / NULLIF(EXTRACT(EPOCH FROM (ts - pts)) / 60.0, 0) AS gpm
              FROM reads
              WHERE pmm IS NOT NULL AND main_meter IS NOT NULL
            ),
            spine AS (
              SELECT unnest(generate_series(
                (SELECT date_trunc('day', MIN(pts)) FROM intervals),
                (SELECT date_trunc('day', MAX(ts)) FROM intervals),
                INTERVAL '1 day')) AS day
            ),
            metered_daily AS (
              SELECT s.day AS timestamp, i.gpm
              FROM spine s
              JOIN intervals i ON s.day >= i.pts AND s.day < i.ts
            ),
            modeled_daily AS (
              SELECT date_trunc('day', timestamp) AS timestamp,
                gallons / 1440.0 AS gpm
              FROM daily
            )
            SELECT COALESCE(md.timestamp, xd.timestamp) AS timestamp,
              md.gpm AS "metered.usage.gpm",
              xd.gpm AS "modeled.usage.gpm"
            FROM metered_daily md
            FULL OUTER JOIN modeled_daily xd ON md.timestamp = xd.timestamp
            ORDER BY timestamp
      - name: "community-center"
        factory: "sql-derived-series"
        config:
          patterns:
            source: "csv:///history-src/monthly_usage.csv"
          query: >-
            SELECT CAST(timestamp AS TIMESTAMP) AS timestamp,
              community_center - LAG(community_center) OVER (ORDER BY timestamp)
                AS monthly_usage
            FROM source
            ORDER BY timestamp
---
version: v1
kind: mknod
metadata:
  path: /system/etc/90-sitegen
spec:
  factory: sitegen
  config:

    site:
      title: "Caspar Water"
      base_url: "${env:SITE_BASE_URL:-/}"
      site_url: "https://casparwater.us"
      github_url: "https://github.com/jmacd/watertown"

    content:
      - name: "pages"
        pattern: "/content/*.md"
      - name: "blog"
        pattern: "/content/blog/*.md"

    exports:
      - name: "metrics"
        pattern: "/sources/water/reduced/*/*/*.series"
      - name: "analysis"
        pattern: "/sources/water/analysis/*"
      - name: "water-overlay"
        pattern: "/sources/water/annotations/water-overlay*"
      - name: "leak-analysis"
        pattern: "/sources/water/leak/*"
      - name: "usage"
        pattern: "/sources/water/usage/*"
      - name: "usage-calibration"
        pattern: "/sources/water/calibration/*"
      - name: "septic-metrics"
        pattern: "/sources/septic/reduced/*/*/*.series"
      - name: "history"
        pattern: "/history/*"

    subsites:
      - name: "noyo"
        path: "/sources/noyo"
        config: "/system/etc/90-sitegen"
        base_url: "${env:SITE_BASE_URL:-/}noyo-harbor/"

    routes:
      - name: "home"
        type: static
        slug: ""
        page: "/templates/index.md"
        routes:
          - name: "pages"
            type: content
            slug: ""
            content: "pages"
          - name: "blog"
            type: static
            slug: "blog"
            routes:
              - name: "blog-posts"
                type: content
                slug: ""
                content: "blog"
          - name: "data"
            type: static
            slug: "data"
            routes:
              - name: "metric-detail"
                type: template
                slug: "$0"
                page: "/templates/data.md"
                export: "metrics"
                annotations: "water-overlay"
              - name: "history-detail"
                type: template
                slug: "$0"
                page: "/templates/history.md"
                export: "history"
          - name: "analysis"
            type: static
            slug: "analysis"
            routes:
              - name: "analysis-detail"
                type: template
                slug: "$0"
                page: "/templates/analysis.md"
                export: "analysis"
              - name: "leak-detail"
                type: template
                slug: "$0"
                page: "/templates/leak-analysis.md"
                export: "leak-analysis"
          - name: "septic"
            type: static
            slug: "septic"
            routes:
              - name: "septic-detail"
                type: template
                slug: "$0"
                page: "/templates/data.md"
                export: "septic-metrics"
          - name: "explore"
            type: static
            slug: "explore"
            page: "/templates/explore.md"
            export: "metrics"

    labels:
      drawdown-by-month: "Well Recovery"
      horner-by-month: "Horner Plot"
      main-meter: "Main Service"
      community-center: "Community Center"

    metric_registry:
      # Flow rate where 0 is a meaningful baseline: zero-anchor the y-axis and
      # keep it rendered even when only one of the two lines has data in the
      # visible window (e.g. a short recent window where the monthly metered
      # read hasn't landed yet but the daily modeled estimate has).
      usage.gpm: "rate"

    metric_captions:
      usage.gpm: >-
        Delivered/pumped rate in gallons per minute: the main-service encoder
        (metered, monthly, full history) and the depth-derived live estimate
        (modeled, daily average since the 2024-02-15 well configuration). Each
        is gallons used in an aligned interval divided by that interval's
        minutes, so the daily modeled average tracks the monthly meter.

    explore:
      url: "explore/"
      datasets:
        - export: "metrics"
          table: "water"
          label: "Water reduced metrics"
        - export: "septic-metrics"
          table: "septic"
          label: "Septic reduced metrics"
        - export: "analysis"
          table: "analysis"
          label: "Analysis"
        - export: "leak-analysis"
          table: "leak"
          label: "Leak analysis (daily)"
        - export: "usage"
          table: "usage"
          label: "Well usage (derived)"
        - export: "usage-calibration"
          table: "calibration"
          label: "Usage calibration"
        - export: "history"
          table: "history"
          label: "Historical monthly meters"

    partials:
      sidebar: "/templates/sidebar.md"

    static:
      - pattern: "/img/*"

    footer: "Made in Mendocino • ${DATE}"

    header: "img/logo.svg"

    theme:
      bg-image: "none"

      # Cool slate backgrounds (replacing warm beige #f7f6f3)
      bg: "#f0f4f8"
      bg-sidebar: "#e4ecf5"
      bg-card: "#f0f5fb"
      bg-hover: "#dce6f2"

      # Accent — deeper blue, better contrast
      accent: "#0a3d6b"
      accent-light: "#0066ee"
      accent-wash: "#dce8f8"

      # Sidebar nav — cool blue tones (replacing brown/teal)
      nav-btn: "rgba(200, 218, 240, 0.9)"
      nav-btn-hover: "rgba(185, 208, 235, 0.9)"
      nav-btn-active: "rgba(10, 61, 107, 0.9)"
      nav-sub-btn: "rgba(200, 218, 240, 0.55)"
      nav-sub-btn-hover: "rgba(185, 208, 235, 0.8)"
      nav-sub-btn-active: "rgba(10, 61, 107, 0.85)"

      # Text — slightly cooler secondary/muted
      fg-secondary: "#3d4f65"
      fg-muted: "#7a8fa6"

      # Borders — cool blue-gray
      border: "#c4d4e6"
      border-light: "#dce6f2"

    sidebar:
      - "Political"
      - "Blog"
      - "History"
      - "Water"
      - label: "System"
        children:
          - label: "Drawdown"
            href: "${env:SITE_BASE_URL:-/}analysis/drawdown-by-month.html"
          - label: "Horner Recovery"
            href: "${env:SITE_BASE_URL:-/}analysis/horner-by-month.html"
          - label: "Leak Analysis"
            href: "${env:SITE_BASE_URL:-/}analysis/leak-analysis.html"
          - label: "Noyo Harbor"
            href: "${env:SITE_BASE_URL:-/}noyo-harbor/"
          - label: "Septic"
            children:
              - label: "Pump Amps"
                href: "${env:SITE_BASE_URL:-/}septic/pumps.html"
              - label: "Cycle Times"
                href: "${env:SITE_BASE_URL:-/}septic/cycle-times.html"
              - label: "Environment"
                href: "${env:SITE_BASE_URL:-/}septic/environment.html"
      - label: "Monitoring"
        children:
          - label: "Well Depth"
            href: "${env:SITE_BASE_URL:-/}data/well-depth.html"
          - label: "Tank Level"
            href: "${env:SITE_BASE_URL:-/}data/tank-level.html"
          - label: "System Pressure"
            href: "${env:SITE_BASE_URL:-/}data/system-pressure.html"
          - label: "Chlorine Level"
            href: "${env:SITE_BASE_URL:-/}data/chlorine-level.html"
          - label: "pH"
            href: "${env:SITE_BASE_URL:-/}data/ph.html"
          - label: "Main Service"
            href: "${env:SITE_BASE_URL:-/}data/main-meter.html"
          - label: "Community Center"
            href: "${env:SITE_BASE_URL:-/}data/community-center.html"
      - "Software"
      - "Operator"
      - "Thanks"

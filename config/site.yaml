version: v1
kind: mkdir
metadata:
  path: /system/etc
---
version: v1
kind: mkdir
metadata:
  path: /sources
---
version: v1
kind: mknod
metadata:
  path: /content
spec:
  factory: git-ingest
  config:
    url: "https://github.com/jmacd/caspar.water.git"
    ref: "${env:GIT_REF:-main}"
    prefix: "site/content"
---
version: v1
kind: mknod
metadata:
  path: /templates
spec:
  factory: git-ingest
  config:
    url: "https://github.com/jmacd/caspar.water.git"
    ref: "${env:GIT_REF:-main}"
    prefix: "site/templates"
---
version: v1
kind: mknod
metadata:
  path: /img
spec:
  factory: git-ingest
  config:
    url: "https://github.com/jmacd/caspar.water.git"
    ref: "${env:GIT_REF:-main}"
    prefix: "site/img"
---
version: v1
kind: mknod
metadata:
  path: /system/etc/90-sitegen
spec:
  factory: sitegen
  config:
    
    site:
      title: "Caspar Water"
      base_url: "${env:SITE_BASE_URL:-/}"
      site_url: "https://casparwater.us"
      github_url: "https://github.com/jmacd/watertown"
    
    content:
      - name: "pages"
        pattern: "/content/*.md"
      - name: "blog"
        pattern: "/content/blog/*.md"
    
    exports:
      - name: "metrics"
        pattern: "/sources/water/reduced/*/*/*.series"
      - name: "analysis"
        pattern: "/sources/water/analysis/*"
      - name: "water-overlay"
        pattern: "/sources/water/annotations/water-overlay*"
      - name: "leak-analysis"
        pattern: "/sources/water/leak/*"
      - name: "septic-metrics"
        pattern: "/sources/septic/reduced/*/*/*.series"
    
    subsites:
      - name: "noyo"
        path: "/sources/noyo"
        config: "/system/etc/90-sitegen"
        base_url: "${env:SITE_BASE_URL:-/}noyo-harbor/"
    
    routes:
      - name: "home"
        type: static
        slug: ""
        page: "/templates/index.md"
        routes:
          - name: "pages"
            type: content
            slug: ""
            content: "pages"
          - name: "blog"
            type: static
            slug: "blog"
            routes:
              - name: "blog-posts"
                type: content
                slug: ""
                content: "blog"
          - name: "data"
            type: static
            slug: "data"
            routes:
              - name: "metric-detail"
                type: template
                slug: "$0"
                page: "/templates/data.md"
                export: "metrics"
                annotations: "water-overlay"
          - name: "analysis"
            type: static
            slug: "analysis"
            routes:
              - name: "analysis-detail"
                type: template
                slug: "$0"
                page: "/templates/analysis.md"
                export: "analysis"
              - name: "leak-detail"
                type: template
                slug: "$0"
                page: "/templates/leak-analysis.md"
                export: "leak-analysis"
          - name: "septic"
            type: static
            slug: "septic"
            routes:
              - name: "septic-detail"
                type: template
                slug: "$0"
                page: "/templates/data.md"
                export: "septic-metrics"
          - name: "explore"
            type: static
            slug: "explore"
            page: "/templates/explore.md"
            export: "metrics"
    
    explore:
      url: "explore/"
      datasets:
        - export: "metrics"
          table: "water"
          label: "Water reduced metrics"
        - export: "septic-metrics"
          table: "septic"
          label: "Septic reduced metrics"
        - export: "analysis"
          table: "analysis"
          label: "Analysis"
        - export: "leak-analysis"
          table: "leak"
          label: "Leak analysis (daily)"
    
    partials:
      sidebar: "/templates/sidebar.md"
    
    static:
      - pattern: "/img/*"
    
    footer: "Made in Mendocino • ${DATE}"
    
    header: "img/logo.svg"
    
    theme:
      bg-image: "none"

      # Cool slate backgrounds (replacing warm beige #f7f6f3)
      bg: "#f0f4f8"
      bg-sidebar: "#e4ecf5"
      bg-card: "#f0f5fb"
      bg-hover: "#dce6f2"

      # Accent — deeper blue, better contrast
      accent: "#0a3d6b"
      accent-light: "#0066ee"
      accent-wash: "#dce8f8"

      # Sidebar nav — cool blue tones (replacing brown/teal)
      nav-btn: "rgba(200, 218, 240, 0.9)"
      nav-btn-hover: "rgba(185, 208, 235, 0.9)"
      nav-btn-active: "rgba(10, 61, 107, 0.9)"
      nav-sub-btn: "rgba(200, 218, 240, 0.55)"
      nav-sub-btn-hover: "rgba(185, 208, 235, 0.8)"
      nav-sub-btn-active: "rgba(10, 61, 107, 0.85)"

      # Text — slightly cooler secondary/muted
      fg-secondary: "#3d4f65"
      fg-muted: "#7a8fa6"

      # Borders — cool blue-gray
      border: "#c4d4e6"
      border-light: "#dce6f2"
    
    sidebar:
      - "Political"
      - "Blog"
      - "History"
      - "Water"
      - label: "System"
        children:
          - label: "Pump Cycles"
            href: "${env:SITE_BASE_URL:-/}analysis/pump-cycles.html"
          - label: "Leak Analysis"
            href: "${env:SITE_BASE_URL:-/}analysis/leak-analysis.html"
          - label: "Noyo Harbor"
            href: "${env:SITE_BASE_URL:-/}noyo-harbor/"
          - label: "Septic"
            children:
              - label: "Pump Amps"
                href: "${env:SITE_BASE_URL:-/}septic/pumps.html"
              - label: "Cycle Times"
                href: "${env:SITE_BASE_URL:-/}septic/cycle-times.html"
              - label: "Environment"
                href: "${env:SITE_BASE_URL:-/}septic/environment.html"
      - label: "Monitoring"
        children:
          - label: "Well Depth"
            href: "${env:SITE_BASE_URL:-/}data/well-depth.html"
          - label: "Tank Level"
            href: "${env:SITE_BASE_URL:-/}data/tank-level.html"
          - label: "System Pressure"
            href: "${env:SITE_BASE_URL:-/}data/system-pressure.html"
          - label: "Chlorine Level"
            href: "${env:SITE_BASE_URL:-/}data/chlorine-level.html"
          - label: "pH"
            href: "${env:SITE_BASE_URL:-/}data/ph.html"
          - label: "Data Explorer"
            href: "${env:SITE_BASE_URL:-/}explore/"
      - "Software"
      - "Operator"
      - "Thanks"
exporters:
  debug:
    verbosity: detailed
  jsonfile:
    path: "/home/data/septicstation.json"

service:
  pipelines:
    metrics:
      receivers:
      - bme280
      - modbus
      exporters:
      - jsonfile
      - debug
  telemetry:
    logs:
      level: debug
    metrics:
      level: none

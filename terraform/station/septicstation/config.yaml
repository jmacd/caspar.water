
receivers:
  bme280:
    device: "/dev/i2c-5"
    i2c_addr: 0x77
    interval: "10m"
    prefix: "septicstation"
  modbus:
    url: tcp://192.168.70.237:502
    interval: 5m
    timeout: 2s
    reconnect: true       # Orenco closes connection after each request
    read_delay: 15s       # Orenco requires 15s between register reads
    prefix: "orenco"
    metrics:
    - name: RT_PumpMode
      base: 1003             # Pt2
      type: float32
      range: holding
      unit: "1"
      kind: gauge
    - name: DT_PumpMode
      base: 1009             # Pt5
      type: float32
      range: holding
      unit: "1"
      kind: gauge
    - name: RT_Pump1_Amps
      base: 1181             # Pt91
      type: float32
      range: holding
      unit: "Amps"
      kind: gauge
    - name: RT_Pump2_Amps
      base: 1183             # Pt92
      type: float32
      range: holding
      unit: "Amps"
      kind: gauge
    - name: RT_TotalCount
      base: 1283             # Pt142
      type: float32
      range: holding
      unit: "1"
      kind: gauge
    - name: RT_TotalTime
      base: 1285             # Pt143
      type: float32
      range: holding
      unit: "Min"
      kind: gauge
    - name: RT_TotalFlow
      base: 1287             # Pt144
      type: float32
      range: holding
      unit: "Gals"
      kind: gauge
    - name: DT_Pump3_Amps
      base: 1369             # Pt185
      type: float32
      range: holding
      unit: "Amps"
      kind: gauge
    - name: DT_Pump4_Amps
      base: 1371             # Pt186
      type: float32
      range: holding
      unit: "Amps"
      kind: gauge
    - name: DT_TotalCount
      base: 1443             # Pt222
      type: float32
      range: holding
      unit: "1"
      kind: gauge
    - name: DT_TotalTime
      base: 1445             # Pt223
      type: float32
      range: holding
      unit: "Min"
      kind: gauge
    - name: DT_TotalFlow
      base: 1447             # Pt224
      type: float32
      range: holding
      unit: "Gal"
      kind: gauge
    - name: Zone1_CountTday
      base: 1545             # Pt273
      type: float32
      range: holding
      unit: "1"
      kind: gauge
    - name: Zone2_CountTday

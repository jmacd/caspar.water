
receivers:
  bme280:
    device: "/dev/i2c-5"
    i2c_addr: 0x77
    interval: "60s"
    prefix: "septicstation"
  modbus:
    url: "rtu:///dev/ttyUSB0"
    prefix: "septicstation"
    interval: "60s"
    baud: 19200
    data_bits: 8
    stop_bits: 1
    parity: even
    timeout: 200ms
    attributes:
    - name: "hardware_version"
      base: 5002
      type: "uint16"
      range: "holding"
    - name: "software_version"
      base: 5003
      type: "uint16"
      range: "holding"
    - name: "serial_number"
      base: 5004
      type: "uint16"
      range: "holding"
    metrics:
    - name: "energy_usage"
      base: 1
      type: "uint32"
      range: "holding"
      unit: "kWh"
      kind: counter
    - name: "uptime"
      base: 5007
      type: "uint32"
      range: "holding"
      unit: "s"
      kind: counter
    - name: "peak_demand"
      base: 61
      type: "float32"
      range: "holding"
      unit: "kW"
      kind: gauge

exporters:
  debug:
    verbosity: detailed
  otelarrow:
    endpoint: 192.168.80.40:4317
    tls:
      insecure: true
    timeout: 1m
    arrow:
      num_streams: 1
      max_stream_lifetime: 1h
  openlcd:
    device: "/dev/i2c-5"
    i2c_addr: 0x72
    run_for: 10m
    refresh: 5s
    staleness: 2m
    show:
    - metric: septicstation_temperature
      abbrev: temp
    - metric: septicstation_pressure
      abbrev: atmos
    - metric: septicstation_humidity
      abbrev: humid

service:
  pipelines:
    metrics:
      receivers:
#      - modbus
      - bme280
      exporters:
      - otelarrow
#      - debug
#      - openlcd
  telemetry:
    logs:
      level: debug
    metrics:
      level: none

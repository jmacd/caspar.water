
receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: 'pumphouse'
          scrape_interval: 30s
          static_configs:
            - targets: ['192.168.80.60:8888']
  otelarrow:
    protocols:
      grpc:
        endpoint: 192.168.80.40:4317

processors:

exporters:
  influxdb:
    endpoint: "https://influx.casparwater.us"
    org: "casparwater"
    bucket: "production"
    token: "${INFLUXD_TOKEN}"
  # NOTE: write directly to the NFS mount path; do NOT route through
  # the /home/data symlink.  When the NFS mount drops, lumberjack's
  # MkdirAll on the symlinked parent returns EEXIST (the symlink
  # itself exists but the target is gone), which it treats as a
  # permanent config error -- the exporter then rejects every batch
  # silently.  Pointing at the real path lets MkdirAll fail with a
  # transient filesystem error instead, and `RequiresMountsFor=` on
  # the unit prevents the collector from running at all without the
  # mount.  See gateway-collector outage 2026-04-26 for context.
  jsonfile:
    path: "/home/system/water/archive/data/casparwater.json"
  jsonfile/logs:
    path: "/home/system/water/archive/data/systemlogs.json"

service:
  pipelines:
    metrics:
      receivers:
      - prometheus
      - otelarrow
      processors: []
      exporters:
      - jsonfile
      - influxdb
    logs:
      receivers:
      - otelarrow
      exporters:
      - jsonfile/logs
  telemetry:
    logs:
      level: debug
    metrics:
      level: none



# InfluxDB v2 configuration.  Loaded via INFLUXD_CONFIG_PATH set in
# /etc/default/influxdb2; the path is /etc/influxdb/config.toml.
#
# TLS is terminated by Caddy on https://influx.casparwater.us, which
# reverse-proxies to this loopback listener.  The old per-influxd TLS
# certs (/etc/influxdb/casparwater_us.{pem,key}, and the
# casparwater_certs/ tree in this module) are no longer in the data
# path and can be removed.
http-bind-address = "127.0.0.1:8087"

query-concurrency = 1
query-queue-size = 1
session-length = 1200000

# Set to "debug" for verbose troubleshooting.
log-level = "info"

hardening-enabled = true
pprof-disabled = true
metrics-disabled = true

bolt-path = "/var/lib/influxdb/influxd.bolt"
engine-path = "/var/lib/influxdb/engine"

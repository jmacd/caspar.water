    server {
	server_name casparwater.us;

	listen              80 ssl;
	listen              [::]:80 ssl;
	listen              443 ssl;
	listen              [::]:443 ssl;
	ssl_certificate     /etc/casparwater/casparwater_us.crt;
	ssl_certificate_key /etc/casparwater/casparwater_us.key;
	ssl_protocols       TLSv1.2 TLSv1.3;
	ssl_ciphers         HIGH:!aNULL:!MD5;

	root /var/www/html/casparwater;

	index index.html;

	location / {
		try_files $uri $uri.html $uri/ =404;
	}

	# Noyo Harbor subsite
	location /noyo-harbor/ {
		try_files $uri $uri.html $uri/ =404;
	}

	# Vendor assets (DuckDB-WASM, Observable Plot, D3):
	# serve pre-compressed files with aggressive caching.
	location ^~ /vendor/ {
		types {
			application/wasm wasm;
			application/javascript mjs js;
		}
		gzip_static on;
		# Uncomment after installing ngx_brotli:
		# brotli_static on;
		expires 1y;
		add_header Cache-Control "public, immutable";
		try_files $uri =404;
	}

	# Noyo vendor assets (subsite)
	location ^~ /noyo-harbor/vendor/ {
		types {
			application/wasm wasm;
			application/javascript mjs js;
		}
		gzip_static on;
		# Uncomment after installing ngx_brotli:
		# brotli_static on;
		expires 1y;
		add_header Cache-Control "public, immutable";
		try_files $uri =404;
	}
    }

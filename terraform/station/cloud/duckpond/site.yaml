version: v1
kind: mkdir
metadata:
  path: /system/etc
---
version: v1
kind: mkdir
metadata:
  path: /sources
---
version: v1
kind: copy
metadata:
  path: /content
spec:
  source: "host:///root/site/content"
---
version: v1
kind: copy
metadata:
  path: /templates
spec:
  source: "host:///root/site/templates"
---
version: v1
kind: copy
metadata:
  path: /img
spec:
  source: "host:///root/site/img"
---
version: v1
kind: mknod
metadata:
  path: /system/etc/10-water
spec:
  factory: remote
  config:
    region: "auto"
    url: "s3://water-pond"
    endpoint: "${env:R2_ENDPOINT}"
    access_key: "${env:R2_KEY}"
    secret_key: "${env:R2_SECRET}"
    import:
      source_path: "/**"
      local_path: "/sources/water"
---
version: v1
kind: mknod
metadata:
  path: /system/etc/11-noyo
spec:
  factory: remote
  config:
    region: "auto"
    url: "s3://noyo-pond"
    endpoint: "${env:R2_ENDPOINT}"
    access_key: "${env:R2_KEY}"
    secret_key: "${env:R2_SECRET}"
    import:
      source_path: "/**"
      local_path: "/sources/noyo"
---
version: v1
kind: mknod
metadata:
  path: /system/etc/90-sitegen
spec:
  factory: sitegen
  config:
    
    site:
      title: "Caspar Water"
      base_url: "/"
      site_url: "https://casparwater.us"
      github_url: "https://github.com/jmacd/duckpond"
    
    # The water site is the primary site, rendered at /
    # Content and templates come from the water pond import at /sources/water/
    # plus the local copies at /content/ and /templates/
    content:
      - name: "pages"
        pattern: "/content/*.md"
    
    exports:
      - name: "metrics"
        pattern: "/sources/water/reduced/*/*/*.series"
      - name: "analysis"
        pattern: "/sources/water/analysis/*"
    
    subsites:
      - name: "noyo"
        path: "/sources/noyo"
        config: "/system/etc/90-sitegen"
        base_url: "/noyo-harbor/"
    
    routes:
      - name: "home"
        type: static
        slug: ""
        page: "/templates/index.md"
        routes:
          - name: "pages"
            type: content
            slug: ""
            content: "pages"
          - name: "data"
            type: static
            slug: "data"
            routes:
              - name: "metric-detail"
                type: template
                slug: "$0"
                page: "/templates/data.md"
                export: "metrics"
          - name: "analysis"
            type: static
            slug: "analysis"
            routes:
              - name: "analysis-detail"
                type: template
                slug: "$0"
                page: "/templates/analysis.md"
                export: "analysis"
    
    partials:
      sidebar: "/templates/sidebar.md"
    
    static:
      - pattern: "/img/*"
    
    theme:
      bg-image: "url('/img/logo.svg')"
    
    sidebar:
      - "Political"
      - "Blog"
      - "History"
      - "Water"
      - label: "System"
        children:
          - label: "Pump Cycles"
            href: "/analysis/pump-cycles.html"
      - label: "Monitoring"
        children:
          - label: "Well Depth"
            href: "/data/well-depth.html"
          - label: "Tank Level"
            href: "/data/tank-level.html"
          - label: "System Pressure"
            href: "/data/system-pressure.html"
          - label: "Chlorine Level"
            href: "/data/chlorine-level.html"
          - label: "pH"
            href: "/data/ph.html"
      - label: "Noyo Harbor"
        href: "/noyo-harbor/"
      - "Software"
      - "Operator"
      - "Thanks"

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html;
    server_name _;

    location / {
        try_files $uri $uri/ =404;
    }

    # .wasm files need the correct MIME type
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        default_type application/wasm;
    }

    # .mjs files need the correct MIME type for ES module import
    location ~* \.mjs$ {
        types { application/javascript mjs; }
        default_type application/javascript;
    }
}

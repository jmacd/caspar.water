server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html;
    server_name _;

    location / {
        try_files $uri $uri/ =404;
    }

    # Vendor assets (DuckDB-WASM, Observable Plot, D3):
    # serve pre-compressed files with aggressive caching.
    location ^~ /vendor/ {
        types {
            application/wasm wasm;
            application/javascript mjs js;
        }
        gzip_static on;
        # Uncomment after installing ngx_brotli:
        # brotli_static on;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

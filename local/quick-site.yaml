# Minimal sitegen config for fast layout/formatting iteration.
# No subsites, no data exports -- just content pages + static assets.
# Used by quick.sh via host+sitegen:// (reads directly from disk).
#
# Paths are relative to the repo root (the -d argument in quick.sh).

site:
  title: "Caspar Water"
  base_url: "/"
  site_url: "https://casparwater.us"
  github_url: "https://github.com/jmacd/duckpond"

content:
  - name: "pages"
    pattern: "/site/content/*.md"

routes:
  - name: "home"
    type: static
    slug: ""
    page: "/site/templates/index.md"
    routes:
      - name: "pages"
        type: content
        slug: ""
        content: "pages"

partials:
  sidebar: "/site/templates/sidebar.md"

static:
  - pattern: "/site/img/*"

footer: "Made in Mendocino • ${DATE}"

header: "site/img/logo.svg"

theme:
  bg-image: "none"

sidebar:
  - "Political"
  - "Blog"
  - "History"
  - "Water"
  - "Software"
  - "Operator"
  - "Thanks"

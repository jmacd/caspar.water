<!doctype html><html><head><meta charset="utf-8"><title>drawdown</title>
<style>body{font:14px system-ui;margin:20px}</style></head><body>
<h2>Daily minimum-observed drawdown rate (Feb 1 – Jul 17 2026)</h2>
<p>One point/day = signed pressure slope of longest overnight pump-off segment. Higher = faster fall = leak.</p>
<div id="chart"></div>
<script type="module">
import { vegaEmbed } from "../../watertown/crates/sitegen/vendor/dist/vega-bundle.mjs";
const data = await (await fetch("./drawdown_daily.json")).json();
const spec = {
  $schema:"https://vega.github.io/schema/vega-lite/v5.json",
  width:1040,height:360,data:{values:data},
  layer:[
    {mark:{type:"rule",color:"#d64545",strokeDash:[4,4]},encoding:{y:{datum:0.009}}},
    {mark:{type:"line",point:true,color:"#2c6ca0"},
     encoding:{x:{field:"timestamp",type:"temporal"},
               y:{field:"drawdown_rate_psi_per_h",type:"quantitative",title:"drawdown rate (psi/h)"}}}
  ]};
try{ await vegaEmbed("#chart",spec,{actions:false}); document.title="OK"; }
catch(e){ document.body.innerHTML+="<pre style='color:red'>"+e+"</pre>"; }
</script></body></html>
